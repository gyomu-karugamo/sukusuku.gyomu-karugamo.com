<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>業務かるがも – タスク確認</title>
<link rel="icon" type="image/png" href="/assets/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --orange: #e8632a;
  --orange-pale: #fdeede;
  --cream: #faf7f2;
  --brown: #2d1e13;
  --mist: #9a8878;
  --border: rgba(61,43,30,0.1);
  --success: #3d9970;
  --success-pale: #e8f5ee;
  --error: #c0392b;
  --line-green: #06c755;
  --radius: 12px;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  background: var(--cream);
  color: var(--brown);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ヘッダー */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,247,242,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header img { width: 28px; height: 28px; object-fit: contain; }
.header-title { font-size: 15px; font-weight: 500; }
.header-date { font-size: 12px; color: var(--mist); margin-left: auto; }

/* 日付ナビ */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px 16px;
  background: white;
  border-bottom: 1px solid var(--border);
}
.date-nav button {
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
  font-size: 16px; cursor: pointer; color: var(--brown);
}
.date-nav .date-label {
  font-size: 14px; font-weight: 500;
  min-width: 120px; text-align: center;
}
.today-btn {
  font-size: 11px; color: var(--orange);
  background: none; border: none; cursor: pointer;
  text-decoration: underline;
}

/* タブ */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: white;
}
.tab-btn {
  flex: 1; padding: 10px 4px;
  font-family: inherit; font-size: 13px; font-weight: 400;
  border: none; background: transparent;
  border-bottom: 2px solid transparent;
  cursor: pointer; color: var(--mist);
  transition: all 0.15s;
}
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); font-weight: 500; }

/* コンテンツ */
.content { padding: 16px; }
.group-label {
  font-size: 11px; color: var(--mist); letter-spacing: 0.08em;
  font-weight: 500; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.group-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* タスクカード */
.task-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.task-card.done { background: #f8f8f6; opacity: 0.7; }
.task-card.done .task-name { text-decoration: line-through; color: var(--mist); }

.check-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border);
  background: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  transition: all 0.15s;
}
.check-btn.checked {
  background: var(--success); border-color: var(--success); color: white;
}
.check-btn.partner-check.checked {
  background: var(--line-green); border-color: var(--line-green); color: white;
}

.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 14px; font-weight: 400; }
.task-meta { font-size: 11px; color: var(--mist); margin-top: 2px; }
.task-note { font-size: 11px; color: var(--mist); margin-top: 4px; font-style: italic; }

.badge {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  background: var(--orange-pale); color: var(--orange);
}

/* 空状態 */
.empty {
  text-align: center; padding: 40px 20px;
  color: var(--mist); font-size: 14px;
}
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* ローディング */
.loading {
  text-align: center; padding: 40px 20px;
  color: var(--mist); font-size: 14px;
}

/* トースト */
.toast-wrap {
  position: fixed; bottom: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 999; pointer-events: none;
}
.toast {
  background: var(--brown); color: white;
  padding: 10px 20px; border-radius: 999px;
  font-size: 13px; white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  animation: toastIn 0.3s ease;
}
.toast.success { background: var(--success); }
.toast.error   { background: var(--error); }
@keyframes toastIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* 進捗バー */
.progress-bar {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 14px;
}
.progress-label {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--mist); margin-bottom: 6px;
}
.progress-track {
  height: 8px; background: #e8e0d8; border-radius: 999px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 999px;
  background: var(--line-green);
  transition: width 0.4s ease;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<header class="header">
  <img src="/assets/icon.png" alt="業務かるがも">
  <span class="header-title">業務かるがも</span>
  <span class="header-date" id="headerDate"></span>
</header>

<!-- 日付ナビ -->
<div class="date-nav">
  <button id="prevDay">‹</button>
  <div>
    <div class="date-label" id="dateLabel">読み込み中…</div>
    <div style="text-align:center;margin-top:2px;">
      <button class="today-btn" id="todayBtn">今日に戻る</button>
    </div>
  </div>
  <button id="nextDay">›</button>
</div>

<!-- タブ -->
<div class="tabs">
  <button class="tab-btn active" data-tab="partner">👤 あなたのタスク</button>
  <button class="tab-btn" data-tab="me">📋 パートナー担当</button>
  <button class="tab-btn" data-tab="all">📊 進捗</button>
</div>

<div class="content" id="mainContent">
  <div class="loading">🦆 読み込み中…</div>
</div>

<script>
const LIFF_ID           = "2009652849-VvuDGKzF";
const SUPABASE_URL      = "https://gdcnxuymqbzkqfrcvpbe.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkY254dXltcWJ6a3FmcmN2cGJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjAxMTUsImV4cCI6MjA5MDA5NjExNX0.2DGITsYpMg94XaVAfEma_rv71njzyCb445Kcvkj1SyQ";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let appUserId = null;   // アプリ側ユーザーID（line_connectionsから取得）
let lineUserId = null;  // LINEユーザーID
let viewDate = new Date();
let allTasks = [];
let completions = {};
let currentTab = 'partner';

const REPEAT_LABEL = { daily:'毎日', weekdays:'平日', weekly:'毎週', monthly:'毎月' };

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type='') {
  const w = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' '+type : '');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function getDateStr(d) {
  return d.toISOString().slice(0, 10);
}

function getDateLabel(d) {
  const week = ['日','月','火','水','木','金','土'];
  const today = getDateStr(new Date());
  const ds = getDateStr(d);
  const label = `${d.getMonth()+1}/${d.getDate()}（${week[d.getDay()]}）`;
  if (ds === today) return label + ' 今日';
  const yesterday = new Date(Date.now()-86400000);
  if (ds === getDateStr(yesterday)) return label + ' 昨日';
  return label;
}

// 指定日のタスクをフィルタ
function getTasksForDate(dateStr) {
  return allTasks.filter(t => {
    if (!t.repeat || t.repeat === 'none') {
      return (t.task_date || t.created_at?.slice(0,10)) === dateStr;
    }
    const start = t.repeat_start || t.created_at?.slice(0,10);
    const end   = t.repeat_end || '2099-12-31';
    if (dateStr < start || dateStr > end) return false;
    const d = new Date(dateStr + 'T00:00:00');
    if (t.repeat === 'daily')    return true;
    if (t.repeat === 'weekdays') return d.getDay() >= 1 && d.getDay() <= 5;
    if (t.repeat === 'weekly') {
      return d.getDay() === new Date(start+'T00:00:00').getDay();
    }
    if (t.repeat === 'monthly') {
      return d.getDate() === new Date(start+'T00:00:00').getDate();
    }
    return false;
  });
}

// 名前ラベル（profilesから取得）
let myNameLabel = 'パートナー';
let partnerNameLabel = 'あなた';  // LINEから見ると自分=partner

async function loadNames() {
  const { data } = await sb.from('profiles')
    .select('display_name').eq('id', appUserId).single();
  if (data?.display_name) {
    const parts = data.display_name.split(',');
    const myN = (parts[0] || '').trim();
    const ptN = (parts[1] || '').trim();
    if (myN) partnerNameLabel = myN + 'さん（参考）';
    if (ptN) myNameLabel = ptN + 'さん（あなた）';
  }
  // タブラベルも更新
  const tabs = document.querySelectorAll('.tab-btn');
  if (tabs[0]) tabs[0].textContent = myNameLabel + 'のタスク';
  if (tabs[1]) tabs[1].textContent = partnerNameLabel + 'のタスク';
}

async function loadData() {
  const dateStr = getDateStr(viewDate);

  // タスク取得（RLSを回避するためservice_role経由にはできないのでRLSポリシーが必要）
  const { data: tasks, error: taskErr } = await sb.from('tasks').select('*').eq('user_id', appUserId);
  if (taskErr) console.error('tasks error:', taskErr);
  allTasks = tasks || [];

  // 完了状況取得
  const { data: compData } = await sb.from('task_completions')
    .select('task_id, done').eq('user_id', appUserId).eq('date', dateStr);
  completions = {};
  (compData || []).forEach(r => completions[r.task_id] = r.done);

  render();
}

async function toggleCompletion(taskId, currentDone) {
  const dateStr = getDateStr(viewDate);
  const newDone = !currentDone;
  completions[taskId] = newDone;

  const { error } = await sb.from('task_completions').upsert(
    { user_id: appUserId, task_id: taskId, date: dateStr, done: newDone },
    { onConflict: 'user_id,task_id,date' }
  );

  if (error) {
    showToast('エラーが発生しました', 'error');
    completions[taskId] = currentDone; // rollback
  } else {
    showToast(newDone ? '完了しました ✓' : '完了を取り消しました', newDone ? 'success' : '');
  }
  render();
}

function render() {
  const dateStr = getDateStr(viewDate);
  const dayTasks = getTasksForDate(dateStr);

  // 日付表示更新
  document.getElementById('dateLabel').textContent = getDateLabel(viewDate);
  document.getElementById('headerDate').textContent = dateStr;

  const partnerTasks = dayTasks.filter(t => t.assignee === 'partner'); // パートナー担当 = あなた
  const myTasks      = dayTasks.filter(t => t.assignee === 'me');       // me担当 = アプリユーザー

  const content = document.getElementById('mainContent');

  if (currentTab === 'partner') {
    // あなたのタスク（assignee=partner のもの）
    if (partnerTasks.length === 0) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">🎉</div>この日のタスクはありません</div>`;
      return;
    }
    const doneCount = partnerTasks.filter(t => completions[t.id]).length;
    content.innerHTML = `
      <div class="progress-bar">
        <div class="progress-label">
          <span>${myNameLabel}の進捗</span>
          <span>${doneCount} / ${partnerTasks.length}件</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${partnerTasks.length>0?Math.round(doneCount/partnerTasks.length*100):0}%"></div>
        </div>
      </div>
      <div class="group-label">${myNameLabel}のタスク</div>
      ${partnerTasks.map(t => taskCard(t, true)).join('')}`;

  } else if (currentTab === 'me') {
    // パートナー（アプリユーザー）担当の参考表示
    if (myTasks.length === 0) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>この日のタスクはありません</div>`;
      return;
    }
    content.innerHTML = `
      <div class="group-label">${partnerNameLabel}のタスク</div>
      ${myTasks.map(t => taskCard(t, false)).join('')}`;

  } else {
    // 進捗タブ
    const totalDone  = dayTasks.filter(t => completions[t.id]).length;
    const pct = dayTasks.length > 0 ? Math.round(totalDone/dayTasks.length*100) : 0;
    const bar = '█'.repeat(Math.floor(pct/10)) + '░'.repeat(10-Math.floor(pct/10));
    content.innerHTML = `
      <div class="progress-bar">
        <div class="progress-label">
          <span>全体の進捗</span>
          <span>${totalDone} / ${dayTasks.length}件 (${pct}%)</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="group-label">${myNameLabel}担当</div>
      ${partnerTasks.map(t => taskCard(t, true)).join('')}
      ${partnerTasks.length===0 ? '<div class="empty" style="padding:12px 0 20px;"><div class="empty-icon" style="font-size:20px;">🎉</div>なし</div>' : ''}
      <div class="group-label" style="margin-top:8px;">${partnerNameLabel}担当</div>
      ${myTasks.map(t => taskCard(t, false)).join('')}
      ${myTasks.length===0 ? '<div class="empty" style="padding:12px 0 20px;"><div class="empty-icon" style="font-size:20px;">—</div>なし</div>' : ''}`;
  }

  // チェックボタンのイベントを付与
  document.querySelectorAll('.check-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id   = btn.dataset.id;
      const done = btn.dataset.done === 'true';
      toggleCompletion(id, done);
    });
  });
}

function taskCard(t, isPartner) {
  const done  = completions[t.id] || false;
  const repeat = t.repeat && t.repeat !== 'none' ? `<span class="badge">${REPEAT_LABEL[t.repeat]||t.repeat}</span>` : '';
  return `
    <div class="task-card${done?' done':''}">
      <button class="check-btn${done?' checked':''}${isPartner?' partner-check':''}"
        data-id="${t.id}" data-done="${done}">
        ${done ? '✓' : ''}
      </button>
      <div class="task-info">
        <div class="task-name">${escHtml(t.name)} ${repeat}</div>
        ${t.note ? `<div class="task-note">${escHtml(t.note)}</div>` : ''}
      </div>
    </div>`;
}

// タブ切り替え
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b===btn));
    currentTab = btn.dataset.tab;
    render();
  });
});

// 日付ナビ
document.getElementById('prevDay').addEventListener('click', () => {
  viewDate = new Date(viewDate.getTime() - 86400000);
  loadData();
});
document.getElementById('nextDay').addEventListener('click', () => {
  viewDate = new Date(viewDate.getTime() + 86400000);
  loadData();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  viewDate = new Date();
  loadData();
});

// 初期化 — LIFF認証版
async function init() {
  const mc = document.getElementById('mainContent');

  try {
    // LIFF初期化
    await liff.init({ liffId: LIFF_ID });

    // LINEブラウザ以外からアクセスされた場合
    if (!liff.isInClient()) {
      // PC等での開発確認用: URLパラメータ ?uid= があれば使う
      const uid = new URLSearchParams(location.search).get('uid');
      if (uid) {
        lineUserId = uid;
      } else {
        mc.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📱</div>
            <div>LINEアプリから開いてください</div>
          </div>`;
        return;
      }
    } else {
      // LIFF経由 → LINEユーザーIDを取得
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return;
      }
      const profile = await liff.getProfile();
      lineUserId = profile.userId;
    }

  } catch(e) {
    console.error('LIFF init error:', e);
    // フォールバック: URLパラメータ ?uid= を使う（テスト用）
    lineUserId = new URLSearchParams(location.search).get('uid');
    if (!lineUserId) {
      mc.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>読み込みに失敗しました</div>`;
      return;
    }
  }

  // line_user_id → アプリのuser_idを取得
  const { data: conn, error: connErr } = await sb
    .from('line_connections')
    .select('user_id')
    .eq('line_user_id', lineUserId)
    .single();

  if (connErr || !conn) {
    mc.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔗</div>
        <div style="line-height:1.8;">
          LINE連携が見つかりません。<br>
          アプリの「アカウント → LINE連携」から<br>
          コードを発行して連携してください。
        </div>
      </div>`;
    return;
  }

  appUserId = conn.user_id;
  await loadNames();
  await loadData();
}

init();
</script>
</body>
</html>
