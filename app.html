<style>
/* ===== CSS変数（デザイントークン） ===== */
:root {
  --duck:       #4a7c6f;
  --duck-dark:  #3a6359;
  --duck-light: #6a9e8f;
  --duck-pale:  #e8f0ee;
  --cream:      #f2ede6;
  --cream-light:#f8f5f0;
  --warm:       #ece5da;
  --brown:      #3d2b1f;
  --brown-mid:  #7a5c4a;
  --brown-light:#c4a882;
  --ink:        #1a1714;
  --mist:       #8a9a96;
  --line:       rgba(26,23,20,0.08);
  --line-strong:rgba(26,23,20,0.14);
  --error:      #b3261e;
  --error-bg:   #fde8e7;
  --success:    #4a7c6f;
  --shadow-sm:  0 2px 8px rgba(61,43,31,0.08);
  --shadow:     0 8px 28px rgba(61,43,31,0.10);
  --shadow-lg:  0 16px 48px rgba(61,43,31,0.14);
  --radius:     16px;
  --radius-sm:  10px;
  --nav-h:      60px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--brown);
  font-size: 15px;
  line-height: 1.6;
}

/* ===== ナビゲーション ===== */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(255,255,255,0.96);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  z-index: 100;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  font-family: 'Noto Serif JP', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--brown);
  flex-shrink: 0;
}

.nav-logo img { width: 32px; height: 32px; object-fit: contain; }
.nav-logo-text { display: none; }
@media(min-width:500px){ .nav-logo-text { display: block; } }

.nav-tabs {
  display: flex;
  gap: 2px;
  margin-left: auto;
}

.nav-tab {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: transparent;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--mist);
  cursor: pointer;
  transition: all 0.18s;
}

.nav-tab.active {
  background: var(--duck-pale);
  color: var(--duck-dark);
}

.nav-tab:hover:not(.active) {
  background: var(--warm);
  color: var(--brown);
}

/* ===== メインコンテンツ ===== */
#main {
  padding-top: calc(var(--nav-h) + 20px);
  padding-bottom: 40px;
  min-height: 100vh;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ===== ページヘッダー ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}

.page-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--brown);
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line-strong);
  background: #fff;
  font-size: 0.85rem;
  color: var(--brown-mid);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}

.back-btn:hover { background: var(--warm); }

/* ===== ボタン ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--duck);
  color: #fff;
}
.btn-primary:hover { background: var(--duck-dark); }
.btn-primary:disabled { background: var(--mist); cursor: not-allowed; opacity: 0.7; }

.btn-secondary {
  background: #fff;
  color: var(--duck);
  border: 1.5px solid var(--duck);
}
.btn-secondary:hover { background: var(--duck-pale); }

.btn-danger {
  background: #fff;
  color: var(--error);
  border: 1.5px solid var(--error);
}
.btn-danger:hover { background: var(--error-bg); }

.btn-sm {
  padding: 6px 12px;
  font-size: 0.82rem;
}

/* ===== カード ===== */
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}

/* ===== 生徒グリッド ===== */
.student-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

@media(min-width:600px){
  .student-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

.student-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: var(--shadow-sm);
}

.student-card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
  border-color: var(--duck-light);
}

.student-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  overflow: hidden;
  margin: 0 auto 12px;
  border: 2.5px solid var(--duck-pale);
}

.student-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.avatar-initial {
  width: 100%; height: 100%;
  background: var(--duck-pale);
  color: var(--duck);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 1.6rem;
  font-weight: 700;
}

.student-name {
  font-weight: 700;
  font-size: 1rem;
  color: var(--brown);
  margin-bottom: 4px;
}

.student-since {
  font-size: 0.78rem;
  color: var(--mist);
}

/* ===== 生徒詳細 ===== */
.student-detail-header {
  display: flex;
  align-items: center;
  gap: 18px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}

.student-detail-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  border: 2.5px solid var(--duck-pale);
}

.student-detail-avatar img { width: 100%; height: 100%; object-fit: cover; }

.student-detail-info { flex: 1; min-width: 0; }
.student-detail-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 4px;
}

.student-detail-meta { font-size: 0.82rem; color: var(--mist); }

.student-detail-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ===== タイムライン ===== */
.timeline { display: flex; flex-direction: column; gap: 16px; }

.timeline-item {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.timeline-date {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--cream-light);
  border-bottom: 1px solid var(--line);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--duck-dark);
}

.timeline-photos {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x mandatory;
}

.timeline-photos::-webkit-scrollbar { height: 4px; }
.timeline-photos::-webkit-scrollbar-track { background: transparent; }
.timeline-photos::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }

.timeline-photo {
  flex-shrink: 0;
  width: 140px;
  height: 100px;
  border-radius: 8px;
  overflow: hidden;
  scroll-snap-align: start;
  background: var(--warm);
}

.timeline-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  cursor: pointer;
  transition: transform 0.2s;
}

.timeline-photo img:hover { transform: scale(1.04); }

.timeline-memo {
  padding: 10px 16px 14px;
  font-size: 0.9rem;
  color: var(--brown-mid);
  line-height: 1.7;
  white-space: pre-wrap;
}

.timeline-actions {
  display: flex;
  gap: 8px;
  padding: 0 12px 12px;
}

/* ===== アルバムエディター ===== */
.album-editor-header {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}

.album-title-input {
  width: 100%;
  padding: 12px 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--brown);
  background: var(--cream-light);
  border: 1.5px solid var(--line-strong);
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}

.album-title-input:focus { border-color: var(--duck); background: #fff; }
.album-title-input::placeholder { color: var(--mist); }

.album-hint {
  font-size: 0.82rem;
  color: var(--mist);
}

.album-photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

@media(min-width:600px){
  .album-photo-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
}

.album-photo-item {
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all 0.15s;
  cursor: grab;
}

.album-photo-item.excluded {
  opacity: 0.4;
  border-style: dashed;
}

.album-photo-item:active { cursor: grabbing; }

.album-photo-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
}

.album-photo-meta {
  padding: 10px 12px;
}

.album-photo-date {
  font-size: 0.78rem;
  color: var(--duck-dark);
  margin-bottom: 4px;
  font-weight: 500;
}

.album-photo-memo {
  font-size: 0.82rem;
  color: var(--brown-mid);
  line-height: 1.55;
  max-height: 3.1em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.album-photo-actions {
  padding: 0 12px 12px;
  display: flex;
  gap: 6px;
}

.drag-handle {
  cursor: grab;
  color: var(--mist);
  font-size: 1.1rem;
  line-height: 1;
  padding: 2px 4px;
}

/* ===== 完成アルバムビュー ===== */
.album-view-header {
  background: linear-gradient(135deg, var(--duck) 0%, var(--duck-dark) 100%);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 24px;
  color: #fff;
  box-shadow: var(--shadow);
}

.album-view-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.album-view-student { font-size: 0.9rem; opacity: 0.85; margin-bottom: 16px; }

.album-view-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.btn-white {
  background: rgba(255,255,255,0.18);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.45);
}
.btn-white:hover { background: rgba(255,255,255,0.30); }

.album-photo-list { display: flex; flex-direction: column; gap: 20px; }

.album-photo-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.album-photo-card img {
  width: 100%;
  max-height: 400px;
  object-fit: contain;
  background: var(--ink);
}

.album-photo-card-meta {
  padding: 14px 18px;
  border-top: 1px solid var(--line);
}

.album-photo-card-date {
  font-size: 0.82rem;
  color: var(--duck-dark);
  font-weight: 500;
  margin-bottom: 6px;
}

.album-photo-card-memo {
  font-size: 0.92rem;
  color: var(--brown-mid);
  line-height: 1.7;
  white-space: pre-wrap;
}

/* ===== 共有ページ ===== */
.share-header {
  background: linear-gradient(135deg, var(--duck) 0%, var(--duck-dark) 100%);
  padding: 32px 20px;
  text-align: center;
  color: #fff;
}

.share-header-logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  opacity: 0.75;
  margin-bottom: 16px;
}

.share-header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 12px;
}

.share-header-student { font-size: 0.9rem; opacity: 0.85; }

.share-page { max-width: 700px; margin: 0 auto; padding: 0 0 60px; }

.share-actions {
  display: flex;
  justify-content: center;
  padding: 20px 16px;
}

.share-photo-list { padding: 0 16px; display: flex; flex-direction: column; gap: 20px; }

/* ===== アカウントタブ ===== */
.account-section {
  max-width: 580px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.plan-card {
  background: #fff;
  border: 2px solid var(--line);
  border-radius: var(--radius);
  padding: 22px 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
}

.plan-card.current { border-color: var(--duck); }

.plan-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--duck-pale);
  color: var(--duck-dark);
  border: 1px solid rgba(74,124,111,.2);
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}

.plan-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 6px;
}

.plan-price {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--duck);
  margin-bottom: 14px;
}

.plan-price span { font-size: 0.85rem; color: var(--mist); font-weight: 400; }

.plan-features { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }

.plan-feature {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.88rem;
  color: var(--brown-mid);
}

.plan-feature::before { content: '✓'; color: var(--duck); font-weight: 700; flex-shrink: 0; }

/* ===== モーダル ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,23,20,0.5);
  backdrop-filter: blur(3px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

@media(min-width:600px){
  .modal-overlay { align-items: center; padding: 20px; }
}

.modal {
  background: #fff;
  width: 100%;
  max-width: 520px;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 32px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(40px);
  transition: transform 0.22s;
}

.modal-overlay.open .modal {
  transform: translateY(0);
}

@media(min-width:600px){
  .modal { border-radius: 20px; }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--brown);
}

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--warm);
  color: var(--brown-mid);
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.modal-close:hover { background: var(--line-strong); }

/* ===== フォーム ===== */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--brown-mid);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 11px 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  color: var(--brown);
  background: var(--cream-light);
  border: 1.5px solid var(--line-strong);
  border-radius: var(--radius-sm);
  outline: none;
  transition: all 0.2s;
}

.form-input:focus { border-color: var(--duck); background: #fff; box-shadow: 0 0 0 3px rgba(74,124,111,0.10); }

textarea.form-input {
  resize: vertical;
  min-height: 90px;
  line-height: 1.65;
}

/* 定型文ボタン */
.quick-phrases {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.quick-phrase-btn {
  padding: 5px 11px;
  border-radius: 999px;
  border: 1px solid var(--duck-light);
  background: var(--duck-pale);
  color: var(--duck-dark);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}

.quick-phrase-btn:hover { background: var(--duck); color: #fff; }

/* 写真アップロードエリア */
.photo-upload-area {
  border: 2px dashed var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
  background: var(--cream-light);
  color: var(--mist);
  font-size: 0.9rem;
}

.photo-upload-area:hover, .photo-upload-area.dragover {
  border-color: var(--duck);
  background: var(--duck-pale);
  color: var(--duck-dark);
}

.photo-preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.photo-preview-item {
  position: relative;
  aspect-ratio: 1;
  border-radius: 8px;
  overflow: hidden;
}

.photo-preview-item img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.photo-preview-remove {
  position: absolute;
  top: 4px; right: 4px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(26,23,20,0.65);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* プロフィール写真 */
.avatar-upload-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 8px;
}

.avatar-upload-preview {
  width: 64px; height: 64px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid var(--duck-pale);
  background: var(--warm);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--mist);
}

.avatar-upload-preview img { width: 100%; height: 100%; object-fit: cover; }

/* ===== 状態表示 ===== */
.loading {
  text-align: center;
  padding: 48px 20px;
  color: var(--mist);
  font-size: 0.9rem;
}

.loading::before {
  content: '';
  display: block;
  width: 32px; height: 32px;
  border: 3px solid var(--duck-pale);
  border-top-color: var(--duck);
  border-radius: 50%;
  margin: 0 auto 12px;
  animation: spin 0.8s linear infinite;
}

async function loadProfile() {

// プラン上限取得
function getLimits() {

}

function route() {
  const hash = location.hash || '#/students';
  updateNavTabs(hash);

  if (hash === '#/students' || hash === '') {
    renderStudentList();
  } else if (hash.startsWith('#/students/') && hash.includes('/album/new')) {

async function renderStudentList() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading"></div>';

  const { data: students, error } = await sb
    .from('students')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: true });

  if (error) { main.innerHTML = errHtml(error.message); return; }

  const limits = getLimits();
  const atLimit = students.length >= limits.maxStudents;

  const addBtn = atLimit
    ? `<div class="notice notice-warn" style="margin:0;font-size:0.82rem">
        ${limits.name}の生徒登録上限（${limits.maxStudents}名）に達しています
       </div>`
    : `<button class="btn btn-primary" onclick="openAddStudentModal()">＋ 生徒を追加</button>`;

  main.innerHTML = `
    <div class="page fade-up">
      <div class="page-header">
        <h1 class="page-title">生徒一覧</h1>
        ${addBtn}

      <div class="student-grid" id="student-grid">
        ${students.length === 0 ? emptyState('📋', 'まだ生徒が登録されていません<br>「生徒を追加」ボタンから始めましょう') : ''}
        ${students.map(s => studentCardHtml(s)).join('')}
      </div>
    </div>`;
}

function studentCardHtml(s) {
  const photoUrl = s.photo_path ? getPublicUrl(s.photo_path) : null;
  const initial = s.name ? s.name[0] : '?';
  return `
    <div class="student-card" onclick="location.hash='#/students/${s.id}'">
      <div class="student-avatar">
        ${photoUrl
          ? `<img src="${photoUrl}" alt="${esc(s.name)}" loading="lazy">`
          : `<div class="avatar-initial">${esc(initial)}</div>`}
      </div>
      <div class="student-name">${esc(s.name)}</div>
      ${s.joined_at ? `<div class="student-since">入会 ${formatDate(s.joined_at)}</div>` : ''}
    </div>`;
}

// ============================================================
// 生徒詳細（タイムライン）
// ============================================================
async function renderStudentDetail(studentId) {
  currentStudentId = studentId;
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading"></div>';

  const [{ data: student, error: se }, { data: records, error: re }] = await Promise.all([
    sb.from('students').select('*').eq('id', studentId).single(),
    sb.from('lesson_records')
      .select('*, record_photos(id, storage_path, sort_order)')
      .eq('student_id', studentId)
      .order('recorded_at', { ascending: false })
      .order('created_at', { ascending: false }),
  ]);

  if (se) { main.innerHTML = errHtml('生徒情報を取得できませんでした'); return; }

  const photoUrl = student.photo_path ? getPublicUrl(student.photo_path) : null;
  const initial  = student.name ? student.name[0] : '?';

  main.innerHTML = `
    <div class="page fade-up">
      <div class="page-header" style="flex-wrap:wrap;gap:8px">

      </div>

      <div class="student-detail-header">
        <div class="student-detail-avatar">
          ${photoUrl
            ? `<img src="${photoUrl}" alt="${esc(student.name)}">`
            : `<div class="avatar-initial">${esc(initial)}</div>`}
        </div>
        <div class="student-detail-info">
          <div class="student-detail-name">${esc(student.name)}</div>
          ${student.joined_at ? `<div class="student-detail-meta">入会日: ${formatDate(student.joined_at)}</div>` : ''}
          <div class="student-detail-meta" style="margin-top:4px">${records ? records.length : 0}件の記録</div>
        </div>
        <div class="student-detail-actions">
          <button class="btn btn-primary btn-sm" onclick="openRecordModal()">＋ 記録を追加</button>
          <button class="btn btn-secondary btn-sm" onclick="startAlbum('${studentId}')">📒 アルバムを作る</button>
        </div>
      </div>

      <div class="timeline" id="timeline">

        ${(!records || records.length === 0) ? emptyState('📸', 'まだ記録がありません<br>「記録を追加」から写真とメモを残しましょう') : ''}

      </div>
    </div>`;
}

function timelineItemHtml(record) {
  // 写真をsort_orderでソート
  const photos = (record.record_photos || []).slice().sort((a,b) => a.sort_order - b.sort_order);
  const photosHtml = photos.length > 0
    ? `<div class="timeline-photos">
        ${photos.map(p => `
          <div class="timeline-photo">

       </div>`
    : '';

  return `
    <div class="timeline-item" id="record-${record.id}">
      <div class="timeline-date">

        <span style="margin-left:auto;font-size:0.78rem;color:var(--mist)">${photos.length}枚</span>

      </div>
    </div>`;
}

// ============================================================
// アルバム作成開始
// ============================================================
async function startAlbum(studentId) {
  // 月次上限チェック
  const limits = getLimits();
  if (limits.maxAlbumsPerMonth < Infinity) {
    const now = new Date();
    const monthStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    const { count } = await sb.from('albums')
      .select('*', { count: 'exact', head: true })
      .eq('student_id', studentId)
      .gte('created_at', monthStart);
    // user_idフィルタのため students join
    const { count: totalCount } = await sb
      .from('albums')
      .select('*, students!inner(user_id)', { count: 'exact', head: true })
      .eq('students.user_id', currentUser.id)
      .gte('created_at', monthStart);

    if ((totalCount || 0) >= limits.maxAlbumsPerMonth) {
      alert(`${limits.name}のアルバム生成は月${limits.maxAlbumsPerMonth}回までです。\nスタンダードプランにアップグレードすると無制限でご利用いただけます。`);
      return;
    }
  }

  // アルバムレコード作成（下書き）
  const { data: album, error } = await sb.from('albums').insert({
    student_id: studentId,
    title: '',
    is_finalized: false,
  }).select().single();

  if (error) { alert('アルバムの作成に失敗しました: ' + error.message); return; }

  // 全写真をアルバムに追加
  const { data: records } = await sb
    .from('lesson_records')
    .select('recorded_at, memo, record_photos(id, storage_path, sort_order)')
    .eq('student_id', studentId)
    .order('recorded_at', { ascending: true });

  const albumPhotos = [];
  let order = 0;
  for (const r of (records || [])) {
    const photos = (r.record_photos || []).slice().sort((a,b) => a.sort_order - b.sort_order);
    for (const p of photos) {
      albumPhotos.push({
        album_id:   album.id,
        photo_id:   p.id,
        memo:       r.memo || '',
        recorded_at: r.recorded_at,
        sort_order:  order++,
        is_excluded: false,
      });
    }
  }

  if (albumPhotos.length > 0) {
    await sb.from('album_photos').insert(albumPhotos);
  }

  location.hash = `#/students/${studentId}/album/${album.id}`;
}

async function issueShareLink(albumId) {
  // 既存トークン確認
  const { data: album } = await sb.from('albums').select('share_token, title').eq('id', albumId).single();
  let token = album?.share_token;

  if (!token) {
    // トークン生成（ランダム16バイト）
    token = Array.from(crypto.getRandomValues(new Uint8Array(16)))
      .map(b => b.toString(16).padStart(2,'0')).join('');
    const { error } = await sb.from('albums').update({ share_token: token }).eq('id', albumId);
    if (error) { alert('共有リンクの発行に失敗しました'); return; }
  }

  currentShareLink = `${APP_URL}#/share/${token}`;
  document.getElementById('share-link-display').textContent = currentShareLink;
  openModal('modal-share');
}

async function downloadAlbumPDF(albumId) {
  const { data: album } = await sb.from('albums').select('title, students(name)').eq('id', albumId).single();
  const { data: photos } = await sb
    .from('album_photos').select('*')
    .eq('album_id', albumId).eq('is_excluded', false)
    .order('sort_order', { ascending: true });

  await generatePDF(album?.title || 'アルバム', album?.students?.name || '', photos || []);
}

async function downloadSharePDF() {
  await generatePDF(window._shareTitle || 'アルバム', '', window._sharePhotos || []);
}

async function generatePDF(title, studentName, photos) {
  if (photos.length === 0) { alert('写真がありません'); return; }

  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const W = 210, H = 297, M = 14;

    // ===== 表紙 =====
    doc.setFillColor(74, 124, 111);
    doc.rect(0, 0, W, H, 'F');
    doc.setFillColor(255, 255, 255, 0.1);

    // タイトル（白文字）
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    const titleLines = doc.splitTextToSize(title, W - M*2);
    doc.text(titleLines, W/2, 120, { align: 'center' });

    if (studentName) {
      doc.setFontSize(13);
      doc.text(studentName, W/2, 120 + titleLines.length * 10 + 10, { align: 'center' });
    }

    doc.setFontSize(10);
    doc.setTextColor(255, 255, 255, 0.7);
    doc.text('すくすくかるがもアルバム', W/2, H - 20, { align: 'center' });

    // ===== 写真ページ（2枚/ページ） =====
    const renderArea = document.getElementById('pdf-render-area');

    for (let i = 0; i < photos.length; i += 2) {
      const batch = photos.slice(i, i+2);
      doc.addPage();

      let y = M;
      for (const p of batch) {
        // html2canvasで画像を描画してbase64取得
        const url = p.storage_path ? getPublicUrl(p.storage_path) : '';
        const imgData = await fetchImageBase64(url);
        if (!imgData) continue;

        const imgH = 100; // mm
        const imgW = W - M*2;

        try {
          doc.addImage(imgData, 'JPEG', M, y, imgW, imgH);
        } catch {
          try { doc.addImage(imgData, 'PNG', M, y, imgW, imgH); } catch(e2) { console.warn('addImage error', e2); }
        }
        y += imgH + 3;

        // 日付
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.setTextColor(74, 124, 111);
        doc.text(formatDate(p.recorded_at), M, y + 4);
        y += 7;

        // メモ
        if (p.memo) {
          doc.setFontSize(10);
          doc.setTextColor(61, 43, 31);
          const memoLines = doc.splitTextToSize(p.memo, imgW);
          const shown = memoLines.slice(0, 3);
          doc.text(shown, M, y + 4);
          y += shown.length * 5 + 8;
        } else {
          y += 6;
        }
      }

      // ページ番号
      doc.setFontSize(8);
      doc.setTextColor(180, 180, 180);
      doc.text(`${Math.floor(i/2) + 1}`, W/2, H - 8, { align: 'center' });
    }

    doc.save(`${title}.pdf`);
  } catch(e) {
    alert('PDF生成に失敗しました: ' + e.message);
    console.error(e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '⬇ PDFダウンロード'; }
  }
}

// 画像URLをbase64に変換（CORSを回避するため一度blob経由）
async function fetchImageBase64(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch(e) {
    console.warn('fetchImageBase64 error:', url, e);
    return null;
  }
}

  const ta = document.getElementById('record-memo-input');
  const pos = ta.selectionStart;
  const before = ta.value.slice(0, pos);
  const after  = ta.value.slice(pos);

function addPhotoPreviews(files, containerId) {
  const container = document.getElementById(containerId);
  for (const file of files) {
    recordPhotoFiles.push(file);
    const idx = recordPhotoFiles.length - 1;
    const url = URL.createObjectURL(file);
    const div = document.createElement('div');
    div.className = 'photo-preview-item';

function handleDragLeave(e, areaId) {
  document.getElementById(areaId).classList.remove('dragover');
}
function handleDrop(e, containerId) {

  btn.textContent = '保存中...';

  try {
    // レッスン記録を作成
    const { data: record, error: rErr } = await sb.from('lesson_records').insert({
      student_id: currentStudentId,
      memo:        memo || null,
      recorded_at: date,

        ` : `

          <div class="plan-badge">現在のプラン</div>
          <div class="plan-name">ライトプラン（無料）</div>
          <div class="plan-price">¥0 <span>/ 月</span></div>
          <div class="plan-features">
            <div class="plan-feature">生徒登録 最大15名</div>
            <div class="plan-feature">アルバム生成 月1回まで</div>
            <div class="plan-feature">PDFダウンロード</div>
          </div>
        </div>

        <div class="plan-card" style="border-color:var(--duck)">
          <div class="plan-badge" style="background:var(--duck);color:#fff;border-color:var(--duck)">おすすめ</div>
          <div class="plan-name">スタンダードプラン</div>
          <div class="plan-price">¥980 <span>/ 月（14日間無料）</span></div>
          <div class="plan-features">
            <div class="plan-feature">生徒登録 無制限</div>
            <div class="plan-feature">アルバム生成 無制限</div>
            <div class="plan-feature">保護者への共有リンク発行</div>
            <div class="plan-feature">PDFダウンロード</div>
          </div>
          <button class="btn btn-primary" style="width:100%" onclick="startCheckout('standard')">
            14日間無料で試す →
          </button>
        </div>
        `}

        <!-- ===== ログアウト ===== -->
        <div class="card" style="display:flex;justify-content:center">
          <button class="btn btn-danger btn-sm" onclick="signOut()">ログアウト</button>
        </div>

      </div>
    </div>`;
}

// メールアドレス変更フォーム表示/非表示
function showEmailForm() {
  document.getElementById('email-form').style.display = 'block';
  document.getElementById('email-display-row').querySelector('button').style.display = 'none';
  document.getElementById('new-email-input').focus();
}
function hideEmailForm() {
  document.getElementById('email-form').style.display = 'none';
  document.getElementById('email-display-row').querySelector('button').style.display = '';
  document.getElementById('email-msg').textContent = '';
}

async function changeEmail() {
  const newEmail = document.getElementById('new-email-input').value.trim();
  const msg = document.getElementById('email-msg');
  if (!newEmail) { msg.textContent = 'メールアドレスを入力してください'; msg.style.color = 'var(--error)'; return; }

  const { error } = await sb.auth.updateUser({ email: newEmail });
  if (error) {
    msg.textContent = 'エラー: ' + error.message;
    msg.style.color = 'var(--error)';
  } else {
    msg.textContent = '確認メールを送信しました。新しいメールアドレス宛のリンクをクリックして変更を完了してください。';
    msg.style.color = 'var(--success)';
  }
}

// パスワード変更フォーム表示/非表示
function showPwForm() {
  document.getElementById('pw-form').style.display = 'block';
  document.getElementById('pw-display-row').querySelector('button').style.display = 'none';
  document.getElementById('new-pw-input').focus();
}
function hidePwForm() {
  document.getElementById('pw-form').style.display = 'none';
  document.getElementById('pw-display-row').querySelector('button').style.display = '';
  document.getElementById('new-pw-input').value = '';
  document.getElementById('new-pw-confirm-input').value = '';
  document.getElementById('pw-msg').textContent = '';
}

async function changePassword() {
  const newPw  = document.getElementById('new-pw-input').value;
  const confirm = document.getElementById('new-pw-confirm-input').value;
  const msg    = document.getElementById('pw-msg');

  if (newPw.length < 8) {
    msg.textContent = 'パスワードは8文字以上で入力してください';
    msg.style.color = 'var(--error)'; return;
  }
  if (newPw !== confirm) {
    msg.textContent = 'パスワードが一致しません';
    msg.style.color = 'var(--error)'; return;
  }

  const { error } = await sb.auth.updateUser({ password: newPw });
  if (error) {
    msg.textContent = 'エラー: ' + error.message;
    msg.style.color = 'var(--error)';
  } else {
    msg.textContent = 'パスワードを変更しました';
    msg.style.color = 'var(--success)';
    document.getElementById('new-pw-input').value = '';
    document.getElementById('new-pw-confirm-input').value = '';
  }
}

async function startCheckout(plan) {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '処理中...';
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(CHECKOUT_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({
        plan,
        success_url: `${APP_URL}#/account`,
        cancel_url:  `${APP_URL}#/account`,
      }),
    });
    const data = await res.json();
    if (data.url) window.location.href = data.url;
    else alert('チェックアウトURLを取得できませんでした');
  } finally {
    btn.disabled = false;
    btn.textContent = '14日間無料で試す →';
  }
}

async function openPortal() {
  const { data: { session } } = await sb.auth.getSession();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-portal-session`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
    body: JSON.stringify({ return_url: `${APP_URL}#/account` }),
  });
  const data = await res.json();
  if (data.url) window.location.href = data.url;
  else alert('ポータルURLを取得できませんでした');
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = '/index.html';
}

// ============================================================
// モーダルユーティリティ
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// オーバーレイクリックで閉じる
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

// ============================================================
// ライトボックス
// ============================================================
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    document.querySelectorAll('.modal-overlay.open').forEach(m => closeModal(m.id));
  }
});

// ============================================================
// ユーティリティ
// ============================================================
function getPublicUrl(path) {
  if (!path) return '';
  return sb.storage.from(STORAGE_BUCKET).getPublicUrl(path).data.publicUrl;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  } catch { return dateStr; }
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function errHtml(msg) {
  return `<div class="notice notice-error">エラー: ${esc(msg)}</div>`;
}

function emptyState(icon, text) {
  return `
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">${icon}</div>
      <div>${text}</div>
    </div>`;
}
