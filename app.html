<style>
/* ==== CSS変数（デザイントークン） ==== */
:root {
  --duck:       #4a7c6f;
  --duck-dark:  #3a6359;
  --duck-light: #6a9e8f;
  --duck-pale:  #e8f0ee;
  --cream:      #f2ede6;
  --cream-light:#f8f5f0;
  --warm:       #ece5da;
  --brown:      #3d2b1f;
  --brown-mid:  #7a5c4a;
  --brown-light:#c4a882;
  --ink:        #1a1714;
  --mist:       #8a9a96;
  --line:       rgba(26,23,20,0.08);
  --line-strong:rgba(26,23,20,0.14);
  --error:      #b3261e;
  --error-bg:   #fde8e7;
  --success:    #4a7c6f;
  --shadow-sm:  0 2px 8px rgba(61,43,31,0.08);
  --shadow:     0 8px 28px rgba(61,43,31,0.10);
  --shadow-lg:  0 16px 48px rgba(61,43,31,0.14);
  --radius:     16px;
  --radius-sm:  10px;
  --nav-h:      60px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--brown);
  font-size: 15px;
  line-height: 1.6;
}

/* ===== ナビゲーション ===== */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(255,255,255,0.96);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  z-index: 100;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  font-family: 'Noto Serif JP', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--brown);
  flex-shrink: 0;
}

.nav-logo img { width: 32px; height: 32px; object-fit: contain; }
.nav-logo-text { display: none; }
@media(min-width:500px){ .nav-logo-text { display: block; } }

.nav-tabs {
  display: flex;
  gap: 2px;
  margin-left: auto;
}

.nav-tab {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: transparent;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--mist);
  cursor: pointer;
  transition: all 0.18s;
}

.nav-tab.active {
  background: var(--duck-pale);
  color: var(--duck-dark);
}

.nav-tab:hover:not(.active) {
  background: var(--warm);
  color: var(--brown);
}

/* ===== メインコンテンツ ===== */
#main {
  padding-top: calc(var(--nav-h) + 20px);
  padding-bottom: 40px;
  min-height: 100vh;
}

.page {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ===== ページヘッダー ===== */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 12px;
}

.page-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--brown);
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line-strong);
  background: #fff;
  font-size: 0.85rem;
  color: var(--brown-mid);
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}

.back-btn:hover { background: var(--warm); }

/* ===== ボタン ===== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--duck);
  color: #fff;
}
.btn-primary:hover { background: var(--duck-dark); }
.btn-primary:disabled { background: var(--mist); cursor: not-allowed; opacity: 0.7; }

.btn-secondary {
  background: #fff;
  color: var(--duck);
  border: 1.5px solid var(--duck);
}
.btn-secondary:hover { background: var(--duck-pale); }

.btn-danger {
  background: #fff;
  color: var(--error);
  border: 1.5px solid var(--error);
}
.btn-danger:hover { background: var(--error-bg); }

.btn-sm {
  padding: 6px 12px;
  font-size: 0.82rem;
}

/* ===== カード ===== */
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}

/* ===== 生徒グリッド ===== */
.student-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

@media(min-width:600px){
  .student-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

.student-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
  box-shadow: var(--shadow-sm);
}

.student-card:hover {
  box-shadow: var(--shadow);
  transform: translateY(-2px);
  border-color: var(--duck-light);
}

.student-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  overflow: hidden;
  margin: 0 auto 12px;
  border: 2.5px solid var(--duck-pale);
}

.student-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.avatar-initial {
  width: 100%; height: 100%;
  background: var(--duck-pale);
  color: var(--duck);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif JP', serif;
  font-size: 1.6rem;
  font-weight: 700;
}

.student-name {
  font-weight: 700;
  font-size: 1rem;
  color: var(--brown);
  margin-bottom: 4px;
}

.student-since {
  font-size: 0.78rem;
  color: var(--mist);
}

/* ===== 生徒詳細 ===== */
.student-detail-header {
  display: flex;
  align-items: center;
  gap: 18px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}

.student-detail-avatar {
  width: 72px; height: 72px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  border: 2.5px solid var(--duck-pale);
}

.student-detail-avatar img { width: 100%; height: 100%; object-fit: cover; }

.student-detail-info { flex: 1; min-width: 0; }
.student-detail-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 4px;
}

.student-detail-meta { font-size: 0.82rem; color: var(--mist); }

.student-detail-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ==== タイムライン ==== */
.timeline { display: flex; flex-direction: column; gap: 16px; }

.timeline-item {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.timeline-date {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: var(--cream-light);
  border-bottom: 1px solid var(--line);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--duck-dark);
}

.timeline-photos {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x mandatory;
}

.timeline-photos::-webkit-scrollbar { height: 4px; }
.timeline-photos::-webkit-scrollbar-track { background: transparent; }
.timeline-photos::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }

.timeline-photo {
  flex-shrink: 0;
  width: 140px;
  height: 100px;
  border-radius: 8px;
  overflow: hidden;
  scroll-snap-align: start;
  background: var(--warm);
}

.timeline-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  cursor: pointer;
  transition: transform 0.2s;
}

.timeline-photo img:hover { transform: scale(1.04); }

.timeline-memo {
  padding: 10px 16px 14px;
  font-size: 0.9rem;
  color: var(--brown-mid);
  line-height: 1.7;
  white-space: pre-wrap;
}

.timeline-actions {
  display: flex;
  gap: 8px;
  padding: 0 12px 12px;
}

/* ===== アルバムエディター ===== */
.album-editor-header {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}

.album-title-input {
  width: 100%;
  padding: 12px 14px;
  font-family: 'Noto Serif JP', serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--brown);
  background: var(--cream-light);
  border: 1.5px solid var(--line-strong);
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 12px;
}

.album-title-input:focus { border-color: var(--duck); background: #fff; }
.album-title-input::placeholder { color: var(--mist); }

.album-hint {
  font-size: 0.82rem;
  color: var(--mist);
}

.album-photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

@media(min-width:600px){
  .album-photo-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
}

.album-photo-item {
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all 0.15s;
  cursor: grab;
}

.album-photo-item.excluded {
  opacity: 0.4;
  border-style: dashed;
}

.album-photo-item:active { cursor: grabbing; }

.album-photo-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
}

.album-photo-meta {
  padding: 10px 12px;
}

.album-photo-date {
  font-size: 0.78rem;
  color: var(--duck-dark);
  margin-bottom: 4px;
  font-weight: 500;
}

.album-photo-memo {
  font-size: 0.82rem;
  color: var(--brown-mid);
  line-height: 1.55;
  max-height: 3.1em;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.album-photo-actions {
  padding: 0 12px 12px;
  display: flex;
  gap: 6px;
}

.drag-handle {
  cursor: grab;
  color: var(--mist);
  font-size: 1.1rem;
  line-height: 1;
  padding: 2px 4px;
}

/* ===== 完成アルバムビュー ===== */
.album-view-header {
  background: linear-gradient(135deg, var(--duck) 0%, var(--duck-dark) 100%);
  border-radius: var(--radius);
  padding: 28px 24px;
  margin-bottom: 24px;
  color: #fff;
  box-shadow: var(--shadow);
}

.album-view-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.album-view-student { font-size: 0.9rem; opacity: 0.85; margin-bottom: 16px; }

.album-view-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.btn-white {
  background: rgba(255,255,255,0.18);
  color: #fff;
  border: 1.5px solid rgba(255,255,255,0.45);
}
.btn-white:hover { background: rgba(255,255,255,0.30); }

.album-photo-list { display: flex; flex-direction: column; gap: 20px; }

.album-photo-card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.album-photo-card img {
  width: 100%;
  max-height: 400px;
  object-fit: contain;
  background: var(--ink);
}

.album-photo-card-meta {
  padding: 14px 18px;
  border-top: 1px solid var(--line);
}

.album-photo-card-date {
  font-size: 0.82rem;
  color: var(--duck-dark);
  font-weight: 500;
  margin-bottom: 6px;
}

.album-photo-card-memo {
  font-size: 0.92rem;
  color: var(--brown-mid);
  line-height: 1.7;
  white-space: pre-wrap;
}

/* ===== 共有ページ ===== */
.share-header {
  background: linear-gradient(135deg, var(--duck) 0%, var(--duck-dark) 100%);
  padding: 32px 20px;
  text-align: center;
  color: #fff;
}

.share-header-logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  opacity: 0.75;
  margin-bottom: 16px;
}

.share-header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 12px;
}

.share-header-student { font-size: 0.9rem; opacity: 0.85; }

.share-page { max-width: 700px; margin: 0 auto; padding: 0 0 60px; }

.share-actions {
  display: flex;
  justify-content: center;
  padding: 20px 16px;
}

.share-photo-list { padding: 0 16px; display: flex; flex-direction: column; gap: 20px; }

/* ===== アカウントタブ ===== */
.account-section {
  max-width: 580px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.plan-card {
  background: #fff;
  border: 2px solid var(--line);
  border-radius: var(--radius);
  padding: 22px 20px;
  box-shadow: var(--shadow-sm);
  position: relative;
}

.plan-card.current { border-color: var(--duck); }

.plan-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--duck-pale);
  color: var(--duck-dark);
  border: 1px solid rgba(74,124,111,.2);
  border-radius: 999px;
  padding: 4px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
}

.plan-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--brown);
  margin-bottom: 6px;
}

.plan-price {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--duck);
  margin-bottom: 14px;
}

.plan-price span { font-size: 0.85rem; color: var(--mist); font-weight: 400; }

.plan-features { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }

.plan-feature {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.88rem;
  color: var(--brown-mid);
}

.plan-feature::before { content: '✓'; color: var(--duck); font-weight: 700; flex-shrink: 0; }

/* ===== モーダル ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,23,20,0.5);
  backdrop-filter: blur(3px);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

@media(min-width:600px){
  .modal-overlay { align-items: center; padding: 20px; }
}

.modal {
  background: #fff;
  width: 100%;
  max-width: 520px;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 32px;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(40px);
  transition: transform 0.22s;
}

.modal-overlay.open .modal {
  transform: translateY(0);
}

@media(min-width:600px){
  .modal { border-radius: 20px; }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--brown);
}

.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--warm);
  color: var(--brown-mid);
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.modal-close:hover { background: var(--line-strong); }

/* ===== フォーム ===== */
.form-group { margin-bottom: 16px; }

.form-label {
  display: block;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--brown-mid);
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 11px 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  color: var(--brown);
  background: var(--cream-light);
  border: 1.5px solid var(--line-strong);
  border-radius: var(--radius-sm);
  outline: none;
  transition: all 0.2s;
}

.form-input:focus { border-color: var(--duck); background: #fff; box-shadow: 0 0 0 3px rgba(74,124,111,0.10); }

textarea.form-input {
  resize: vertical;
  min-height: 90px;
  line-height: 1.65;
}

/* 定型文ボタン */
.quick-phrases {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.quick-phrase-btn {
  padding: 5px 11px;
  border-radius: 999px;
  border: 1px solid var(--duck-light);
  background: var(--duck-pale);
  color: var(--duck-dark);
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
}

.quick-phrase-btn:hover { background: var(--duck); color: #fff; }

/* 写真アップロードエリア */
.photo-upload-area {
  border: 2px dashed var(--line-strong);
  border-radius: var(--radius-sm);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
  background: var(--cream-light);
  color: var(--mist);
  font-size: 0.9rem;
}

.photo-upload-area:hover, .photo-upload-area.dragover {
  border-color: var(--duck);
  background: var(--duck-pale);
  color: var(--duck-dark);
}

.photo-preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: 8px;
  margin-top: 12px;
}

.photo-preview-item {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: #fff;
  border: 1px solid var(--line);
}

.photo-preview-item .photo-img-wrap {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  flex-shrink: 0;
}

.photo-preview-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.photo-memo-input {
  font-size: 14px;
  padding: 8px 10px;
  border: none;
  border-top: 1px solid var(--line);
  background: #fafaf8;
  color: var(--brown);
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
  outline: none;
  border-radius: 0 0 8px 8px;
  resize: none;
  min-height: 60px;
  line-height: 1.5;
}
.photo-memo-input:focus {
  background: #fff;
  border-top-color: var(--duck);
  box-shadow: inset 0 1px 0 var(--duck-pale);
}
.photo-memo-input::placeholder {
  color: var(--mist);
}

.photo-preview-remove {
  position: absolute;
  top: 4px; right: 4px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(26,23,20,0.65);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* プロフィール写真 */
.avatar-upload-wrap {
  display: flex;
  align-items: center;

const SUPABASE_URL      = "https://gdcnxuymqbzkqfrcvpbe.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkY254dXltcWJ6a3FmcmN2cGJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjAxMTUsImV4cCI6MjA5MDA5NjExNX0.2DGITsYpMg94XaVAfEma_rv71njzyCb445Kcvkj1SyQ";
const STORAGE_BUCKET    = "album-photos";  // Supabaseストレージバケット名
const CHECKOUT_FN       = `${SUPABASE_URL}/functions/v1/create-checkout-session`;
const APP_URL           = "https://app.gyomu-karugamo.com/app.html";

// ============================================================
// プラン設定
// ============================================================
const PLANS = {
  // maxAlbumsFinalized = アルバム確定（PDF/共有可能化）の月間上限
  free:     { name: '無料プラン（お試し）', maxStudents: 2,        maxAlbumsFinalized: 0,        canShare: false, canPDF: false },
  light:    { name: 'ライトプラン',         maxStudents: 15,       maxAlbumsFinalized: 5,        canShare: true,  canPDF: true  },

  premium:  { name: 'スタンダードプラン',   maxStudents: Infinity, maxAlbumsFinalized: Infinity, canShare: true,  canPDF: true  },
};

// ============================================================
// グローバル状態
// ============================================================
let sb, currentUser, currentProfile;
let recordPhotoFiles = []; // 記録追加モーダルの一時写真リスト
let studentAvatarFile = null;   // 生徒追加モーダルの一時アバター
let studentDeleteAvatar = false; // プロフィール画像削除フラグ

let albumSortable    = null;  // SortableJSインスタンス
let currentShareLink = '';    // 発行済み共有リンク

// ============================================================
// 初期化
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });

  // 共有ページは認証不要
  const hash = location.hash;
  if (hash.startsWith('#/share/')) {
    const token = hash.replace('#/share/', '').split('/')[0];
    renderSharePage(token);
    return;
  }

  // セッション確認
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = '/index.html';
    return;
  }
  currentUser = session.user;
  await loadProfile();

  // ナビ表示
  document.getElementById('nav').style.display = 'flex';

  // ルーター設定
  window.addEventListener('hashchange', route);

// プロフィール読み込み
async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = data;
}

// プラン上限取得
function getLimits() {
  const tier = currentProfile?.tier || 'free';
  return PLANS[tier] || PLANS.free;
}

// ============================================================
// ルーター
// ============================================================
function route() {
  const hash = location.hash || '#/students';
  updateNavTabs(hash);

  if (hash === '#/students' || hash === '') {
    renderStudentList();
  } else if (hash.startsWith('#/students/') && hash.includes('/album/new')) {
    const studentId = hash.split('/')[2];
    renderAlbumEditor(studentId, null);
  } else if (hash.startsWith('#/students/') && hash.includes('/album/') && !hash.includes('/new')) {
    const parts = hash.split('/');
    renderAlbumEditor(parts[2], parts[4]);
  } else if (hash.startsWith('#/students/')) {
    const studentId = hash.split('/')[2];
    renderStudentDetail(studentId);
  } else if (hash === '#/account') {
    renderAccount();
  } else {
    renderStudentList();
  }
}

function updateNavTabs(hash) {
  document.getElementById('tab-students').classList.toggle('active', !hash.startsWith('#/account'));
  document.getElementById('tab-account').classList.toggle('active', hash.startsWith('#/account'));
}

// ============================================================
// 生徒一覧
// ============================================================
async function renderStudentList() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading"></div>';

  const { data: students, error } = await sb
    .from('students')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: true });

  if (error) { main.innerHTML = errHtml(error.message); return; }

  const limits = getLimits();
  const atLimit = students.length >= limits.maxStudents;

  const addBtn = atLimit
    ? `<div class="notice notice-warn" style="margin:0;font-size:0.82rem">
        ${limits.name}の生徒登録上限（${limits.maxStudents}名）に達しています
       </div>`
    : `<button class="btn btn-primary" onclick="openAddStudentModal()">＋ 生徒を追加</button>`;

  main.innerHTML = `
    <div class="page fade-up">
      <div class="page-header">
        <h1 class="page-title">生徒一覧</h1>
        ${addBtn}
      </div>
      <div class="student-grid" id="student-grid">
        ${students.length === 0 ? emptyState('📋', 'まだ生徒が登録されていません<br>「生徒を追加」ボタンから始めましょう') : ''}
        ${students.map(s => studentCardHtml(s)).join('')}
      </div>
    </div>`;
}

function studentCardHtml(s) {
  const photoUrl = s.photo_path ? getPublicUrl(s.photo_path) : null;
  const initial = s.name ? s.name[0] : '?';
  return `
    <div class="student-card" onclick="location.hash='#/students/${s.id}'">
      <div class="student-avatar">
        ${photoUrl
          ? `<img src="${photoUrl}" alt="${esc(s.name)}" loading="lazy">`
          : `<div class="avatar-initial">${esc(initial)}</div>`}
      </div>
      <div class="student-name">${esc(s.name)}</div>
      ${s.joined_at ? `<div class="student-since">入会 ${formatDate(s.joined_at)}</div>` : ''}
    </div>`;
}

// ============================================================
// 生徒詳細（タイムライン）
// ============================================================
async function renderStudentDetail(studentId) {
  currentStudentId = studentId;
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading"></div>';

  const [{ data: student, error: se }, { data: records, error: re }] = await Promise.all([
    sb.from('students').select('*').eq('id', studentId).single(),
    sb.from('lesson_records')
      .select('*, record_photos(id, storage_path, sort_order)')
      .eq('student_id', studentId)
      .order('recorded_at', { ascending: false })
      .order('created_at', { ascending: false }),
  ]);

  if (se) { main.innerHTML = errHtml('生徒情報を取得できませんでした'); return; }

  const photoUrl = student.photo_path ? getPublicUrl(student.photo_path) : null;
  const initial  = student.name ? student.name[0] : '?';

  main.innerHTML = `
    <div class="page fade-up">
      <div class="page-header" style="flex-wrap:wrap;gap:8px">
        <a href="#/students" class="back-btn">← 一覧へ</a>
        <div style="display:flex;gap:8px;margin-left:auto">
          <button class="btn btn-secondary btn-sm" onclick="openEditStudentModal('${studentId}')">編集</button>
          <button class="btn btn-danger btn-sm" onclick="deleteStudent('${studentId}')">削除</button>
        </div>
      </div>

      <div class="student-detail-header">
        <div class="student-detail-avatar">
          ${photoUrl
            ? `<img src="${photoUrl}" alt="${esc(student.name)}">`
            : `<div class="avatar-initial">${esc(initial)}</div>`}
        </div>
        <div class="student-detail-info">
          <div class="student-detail-name">${esc(student.name)}</div>
          ${student.joined_at ? `<div class="student-detail-meta">入会日: ${formatDate(student.joined_at)}</div>` : ''}
          <div class="student-detail-meta" style="margin-top:4px">${records ? records.length : 0}件の記録</div>
        </div>
        <div class="student-detail-actions">
          <button class="btn btn-primary btn-sm" onclick="openRecordModal()">＋ 記録を追加</button>
          <button class="btn btn-secondary btn-sm" onclick="startAlbum('${studentId}')">📒 アルバムを作る</button>
        </div>
      </div>

      <div class="timeline" id="timeline">
        ${re ? errHtml(re.message) : ''}
        ${(!records || records.length === 0) ? emptyState('📸', 'まだ記録がありません<br>「記録を追加」から写真とメモを残しましょう') : ''}
        ${(records || []).map(r => timelineItemHtml(r)).join('')}
      </div>
    </div>`;
}

function timelineItemHtml(record) {
  // 写真をsort_orderでソート
  const photos = (record.record_photos || []).slice().sort((a,b) => a.sort_order - b.sort_order);
  const photosHtml = photos.length > 0
    ? `<div class="timeline-photos">
        ${photos.map(p => `
          <div class="timeline-photo">
            <img src="${getPublicUrl(p.storage_path)}" alt="" loading="lazy"
              onclick="openLightbox('${getPublicUrl(p.storage_path)}')">
          </div>`).join('')}
       </div>`
    : '';

  return `
    <div class="timeline-item" id="record-${record.id}">
      <div class="timeline-date">
        ${formatDate(record.recorded_at)}
        <span style="margin-left:auto;font-size:0.78rem;color:var(--mist)">${photos.length}枚</span>
      </div>
      ${photosHtml}
      ${record.memo ? `<div class="timeline-memo">${esc(record.memo)}</div>` : ''}
      <div class="timeline-actions">
        <button class="btn btn-secondary btn-sm" onclick="openEditRecordModal('${record.id}')">編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRecord('${record.id}')">削除</button>
      </div>
    </div>`;
}

  // アルバムプレビュー機能は無制限（確定時に回数チェックを行う）

  // アルバムレコード作成（下書き）
  const { data: album, error } = await sb.from('albums').insert({
    student_id: studentId,
    title: '',
    is_finalized: false,
  }).select().single();

  if (error) { alert('アルバムの作成に失敗しました: ' + error.message); return; }

  // 全写真をアルバムに追加
  const { data: records } = await sb
    .from('lesson_records')
    .select('recorded_at, memo, record_photos(id, storage_path, sort_order, memo)')
    .eq('student_id', studentId)
    .order('recorded_at', { ascending: true });

  const albumPhotos = [];
  let order = 0;
  for (const r of (records || [])) {
    const photos = (r.record_photos || []).slice().sort((a,b) => a.sort_order - b.sort_order);
    for (const p of photos) {
      albumPhotos.push({
        album_id:     album.id,
        photo_id:     p.id,
        storage_path: p.storage_path, // 画像パスを保存（PDF・共有ページで必須）
        memo:         p.memo || r.memo || '',
        recorded_at:  r.recorded_at,
        sort_order:   order++,
        is_excluded:  false,
      });
    }
  }

  if (albumPhotos.length > 0) {
    await sb.from('album_photos').insert(albumPhotos);
  }

  location.hash = `#/students/${studentId}/album/${album.id}`;
}

    sb.from('students').select('name, photo_path').eq('id', studentId).single(),

      <div class="page-header">
        <a href="#/students/${studentId}" class="back-btn">← 戻る</a>
        <button class="btn btn-primary" onclick="showAlbumPreview('${studentId}')">プレビューを確認 →</button>

      <div class="album-editor-header">

          <label class="form-label">アルバム名</label>
          <input type="text" class="album-title-input" id="album-title-input"
            placeholder="${esc(student?.name || '')}の成長アルバム"
            value="${esc(album.title || '')}" maxlength="60">
        </div>

        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
          <div>
            <label class="form-label" style="margin-bottom:6px">テーマカラー</label>
            <input type="color" id="album-color-input" value="${esc(accentColor)}"
              style="width:48px;height:36px;border:none;cursor:pointer;border-radius:8px;padding:2px">
          </div>
          <div>
            <label class="form-label" style="margin-bottom:6px">文字色</label>

              style="width:48px;height:36px;border:none;cursor:pointer;border-radius:8px;padding:2px">
          </div>
        </div>

        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">表紙の画像選択</label>
          <div style="display:flex;align-items:center;gap:12px">
            <div id="cover-thumb" style="width:64px;height:64px;border-radius:50%;background:var(--duck-pale);border:2px solid var(--duck-light);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.4rem">
              ${window._editorCoverSrc ? `<img src="${window._editorCoverSrc}" style="width:100%;height:100%;object-fit:cover">` : '📷'}
            </div>
            <button class="btn btn-secondary btn-sm" type="button" onclick="openCoverPicker()">画像を選択</button>

function albumPhotoItemHtml(p) {
  const url = getPublicUrl(p.storage_path || '');
  const excluded = p.is_excluded;
  return `
    <div class="album-photo-item ${excluded ? 'excluded' : ''}" data-photo-id="${p.id}" data-date="${p.recorded_at}" data-memo="${esc(p.memo||'')}" data-src="${url}">
      <span class="drag-handle" title="ドラッグで並び替え">⠿</span>
      <img class="album-photo-img" src="${url}" alt="" loading="lazy"
        onclick="openLightbox('${url}')">
      <div class="album-photo-meta">
        <div class="album-photo-date">${formatDate(p.recorded_at)}</div>
        ${p.memo ? `<div class="album-photo-memo">${esc(p.memo)}</div>` : ''}
      </div>
      <div class="album-photo-actions">
        <button class="btn ${excluded ? 'btn-secondary' : 'btn-danger'} btn-sm"
          onclick="toggleExclude('${p.id}', ${excluded}, this)">
          ${excluded ? '表示' : '非表示'}
        </button>
      </div>
    </div>`;
}

// 除外トグル
async function toggleExclude(photoId, currentExcluded, btnEl) {
  await sb.from('album_photos').update({ is_excluded: !currentExcluded }).eq('id', photoId);
  const el = document.querySelector(`[data-photo-id="${photoId}"]`);
  if (!el) return;
  el.classList.toggle('excluded', !currentExcluded);
  const btn = btnEl || el.querySelectorAll('.album-photo-actions button')[1];
  if (btn) {
    btn.className = `btn ${!currentExcluded ? 'btn-secondary' : 'btn-danger'} btn-sm`;
    btn.textContent = !currentExcluded ? '表示' : '非表示';
    btn.setAttribute('onclick', `toggleExclude('${photoId}', ${!currentExcluded}, this)`);
  }
  const hint = document.querySelector('.album-hint');
  if (hint) {
    const included = document.querySelectorAll('.album-photo-item:not(.excluded)').length;
    hint.textContent = `写真をドラッグで並び替え、表示／非表示を切り替えられます（${included}枚表示中）`;
  }
}

// ============================================================
// アルバムプレビュー
// ============================================================
function showAlbumPreview(studentId) {
  const titleInput    = document.getElementById('album-title-input');
  const title         = titleInput?.value.trim() || titleInput?.placeholder || 'アルバム';
  const accentColor = document.getElementById('album-color-input')?.value || '#4a7c6f';
  const textColor   = document.getElementById('album-text-color-input')?.value || '#3d2b1f';
  const message     = document.getElementById('album-message-input')?.value.trim() || '';

  // グリッドから表示中の写真を収集（buildAlbumPagesが使えるよう storage_path / recorded_at 形式に）
  const items = document.querySelectorAll('#album-grid .album-photo-item:not(.excluded)');
  const photos = [];
  items.forEach(el => {
    const img  = el.querySelector('img.album-photo-img');
    const date = el.getAttribute('data-date') || '';
    const memo = el.getAttribute('data-memo') || '';
    const src  = el.getAttribute('data-src') || img?.src || '';
    if (src) photos.push({ recorded_at: date, memo, _url: src });
  });

  const fakeAlbum = {
    accent_color: accentColor,
    text_color: textColor,
    title,
    students: { name: window._editorStudentName || '' },
    message,
    cover_photo_path: window._editorCoverSrc || null,
  };

  const pages = buildAlbumPages(fakeAlbum, photos);
  if (pages.length === 0) { alert('表示できる写真がありません'); return; }

  window._previewPages     = pages;
  window._previewIndex     = 0;
  window._previewStudentId = studentId;

  document.getElementById('preview-page-container').innerHTML = pages[0];
  document.getElementById('preview-counter').textContent = `1 / ${pages.length}`;
  openModal('modal-preview');
}

function previewPrev() {
  if (!window._previewPages) return;
  window._previewIndex = Math.max(0, window._previewIndex - 1);
  document.getElementById('preview-page-container').innerHTML = window._previewPages[window._previewIndex];
  document.getElementById('preview-counter').textContent = `${window._previewIndex + 1} / ${window._previewPages.length}`;
}

function previewNext() {
  if (!window._previewPages) return;
  window._previewIndex = Math.min(window._previewPages.length - 1, window._previewIndex + 1);
  document.getElementById('preview-page-container').innerHTML = window._previewPages[window._previewIndex];
  document.getElementById('preview-counter').textContent = `${window._previewIndex + 1} / ${window._previewPages.length}`;
}

function openCoverPicker() {
  const grid = document.getElementById('cover-picker-grid');
  // album-photo-grid から除外されていない写真のURLを収集
  const items = document.querySelectorAll('.album-photo-item:not(.excluded)');
  const profileUrl = window._editorProfilePhotoUrl;
  let html = '';

  // プロフィール画像を先頭に表示
  if (profileUrl) {
    const sel = window._editorCoverSrc === profileUrl;
    html += `<div onclick="selectCoverPhoto('${profileUrl}',this)" style="cursor:pointer;border-radius:10px;overflow:hidden;aspect-ratio:1;position:relative;border:3px solid ${sel?'var(--duck)':'transparent'}">
      <img src="${profileUrl}" style="width:100%;height:100%;object-fit:cover">
      ${sel ? '<div style="position:absolute;bottom:4px;right:4px;background:var(--duck);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px">✓</div>' : ''}
      <div style="position:absolute;top:4px;left:4px;background:rgba(0,0,0,.55);color:#fff;border-radius:4px;font-size:10px;padding:2px 5px">プロフィール</div>
    </div>`;
  }

  items.forEach(item => {
    const src = item.dataset.src;
    if (!src) return;

    html += `<div onclick="selectCoverPhoto('${src}',this)" style="cursor:pointer;border-radius:10px;overflow:hidden;aspect-ratio:1;position:relative;border:3px solid ${sel?'var(--duck)':'transparent'}">
      <img src="${src}" style="width:100%;height:100%;object-fit:cover" loading="lazy">
      ${sel ? '<div style="position:absolute;bottom:4px;right:4px;background:var(--duck);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px">✓</div>' : ''}
    </div>`;

  grid.innerHTML = html || '<div style="padding:16px;color:var(--mist)">写真がありません</div>';

function selectCoverPhoto(src) {
  window._editorCoverSrc = src;
  // サムネイル更新
  const thumb = document.getElementById('cover-thumb');
  if (thumb) thumb.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:cover">`;

}

function resetCoverToProfile() {
  const profileUrl = window._editorProfilePhotoUrl;
  if (!profileUrl) return;
  window._editorCoverSrc = profileUrl;
  const thumb = document.getElementById('cover-thumb');
  if (thumb) thumb.innerHTML = `<img src="${profileUrl}" style="width:100%;height:100%;object-fit:cover">`;
}

function setCoverPhoto(btn, src) {

  const thumb = document.getElementById('cover-thumb');

}

function doFinalizeAlbum() {
  closeModal('modal-preview');
  finalizeAlbum(window._previewStudentId);
}

// アルバム完成
async function finalizeAlbum(studentId) {
  // currentAlbumId の補完（URLからフォールバック）
  const albumId = currentAlbumId || location.hash.split('/')[4];
  if (!albumId || albumId === 'undefined') {
    alert('アルバムIDが取得できませんでした。ページを再読み込みしてください。');
    return;
  }

  // ===== アルバム作成機能の月次上限チェック =====
  const limits = getLimits();
  if (!limits.canPDF && !limits.canShare) {
    alert('アルバムの完成はライトプラン以上でご利用いただけます。\nアカウントタブからプランをご確認ください。');
    return;
  }
  const titleInput = document.getElementById('album-title-input');
  let title = titleInput?.value.trim();
  // タイトル未入力時は placeholder の値をデフォルトとして使用
  if (!title) {
    title = titleInput?.placeholder || '成長アルバム';
    if (titleInput) titleInput.value = title;
  }

  // SortableJSの並び順をDBに保存
  const items = document.querySelectorAll('#album-grid .album-photo-item');
  const updates = [];
  items.forEach((el, i) => {
    const photoId = el.getAttribute('data-photo-id');
    if (photoId) updates.push(sb.from('album_photos').update({ sort_order: i }).eq('id', photoId));
  });
  if (updates.length > 0) await Promise.all(updates);

  const accentColor = document.getElementById('album-color-input')?.value || '#4a7c6f';
  const textColor   = document.getElementById('album-text-color-input')?.value || '#3d2b1f';
  const message     = document.getElementById('album-message-input')?.value.trim() || null;
  const coverSrc    = window._editorCoverSrc || null;

  const btn = document.querySelector('.album-editor-header')?.closest('.page')?.querySelector('.btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

  try {
    // まず拡張列を試みる（列がなくてもcoreは必ず保存）
    const extUpdate = { accent_color: accentColor, text_color: textColor, message, cover_photo_path: coverSrc };
    await sb.from('albums').update(extUpdate).eq('id', albumId); // エラーは無視

    // core（必ず成功すべき）
    const { error } = await sb.from('albums').update({
      title,
      is_finalized: true,
      finalized_at: new Date().toISOString(),
    }).eq('id', albumId);

    if (error) { alert('保存に失敗しました: ' + error.message); return; }

    currentAlbumId = albumId;
    renderAlbumView(albumId);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'プレビューを確認 →'; }
  }
}

// ============================================================
// アルバムページ生成（プレビュー・アルバムビュー・共有ページ共用）
// ============================================================
function buildAlbumPages(album, photos) {
  const accentColor   = album.accent_color || '#4a7c6f';
  const textColor     = album.text_color   || '#3d2b1f';
  const photosPerPage = parseInt(album.photos_per_page || 2, 10);
  const title         = album.title || 'アルバム';
  const studentName   = album.students?.name || '';
  // テーマカラーのRGB分解（ginghamパターン用）
  const _r = parseInt(accentColor.slice(1,3),16);
  const _g = parseInt(accentColor.slice(3,5),16);
  const _b = parseInt(accentColor.slice(5,7),16);
  const GC  = `rgba(${_r},${_g},${_b},0.13)`;  // チェック色（薄め）
  const GC2 = `rgba(${_r},${_g},${_b},0.07)`;  // 重なり部分用
  // ギンガムチェック柄：横縞×縦縞の重ね合わせで市松＋チェック
  const GINGHAM = [
    `repeating-linear-gradient(90deg,${GC} 0px,${GC} 28px,transparent 28px,transparent 56px)`,
    `repeating-linear-gradient(0deg,${GC} 0px,${GC} 28px,transparent 28px,transparent 56px)`,
  ].join(',');

  // ロゴ行（最終ページ用）
  const LOGO_LINE = `<div style="margin-top:auto;padding-top:8%;display:flex;flex-direction:column;align-items:center;gap:4px">
    <div style="font-size:clamp(8px,1.5vw,10px);letter-spacing:.2em;color:${accentColor};opacity:.7">すくすくかるがもアルバム</div>
    <div style="width:40px;height:1px;background:${accentColor};opacity:.3"></div>
  </div>`;

  const coverUrl = album.cover_photo_path || null;
  const pages = [];

  // ===== 表紙（ギンガムチェック背景＋中央白パネル） =====
  pages.push(`
    <div style="width:100%;height:100%;background-color:#fff;background-image:${GINGHAM};display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;box-sizing:border-box;padding:8%">
      <div style="background:#fff;border-radius:4px;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8%;box-sizing:border-box;border:1.5px solid rgba(${_r},${_g},${_b},0.25);box-shadow:0 2px 16px rgba(0,0,0,.07)">
        ${coverUrl ? `<div style="width:52%;aspect-ratio:1/1;border-radius:50%;overflow:hidden;border:2px solid rgba(${_r},${_g},${_b},0.35);margin-bottom:8%;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.1)"><img src="${coverUrl}" style="width:100%;height:100%;object-fit:cover;display:block"></div>` : ''}
        <div style="font-size:clamp(15px,3.5vw,24px);font-weight:700;text-align:center;line-height:1.6;word-break:break-all;color:${textColor}">${esc(title)}</div>
        ${studentName ? `<div style="font-size:clamp(10px,2vw,13px);margin-top:8px;color:${textColor};opacity:.65">${esc(studentName)}</div>` : ''}
      </div>
    </div>`);

  // ===== 写真ページ（1枚/ページ固定、日付ヘッダー付き） =====
  for (let pi = 0; pi < photos.length; pi++) {
    const p = photos[pi];
    const isLastPhoto = pi === photos.length - 1;
    const showLogo = isLastPhoto && !album.message;
    const date = p.recorded_at || p.date || '';
    const url  = p._url || (p.storage_path ? getPublicUrl(p.storage_path) : (p.src || ''));
    pages.push(`
      <div style="width:100%;height:100%;background:#fff;display:flex;flex-direction:column;font-family:'Noto Sans JP',sans-serif;overflow:hidden">
        <div style="height:9%;padding:0 5%;display:flex;align-items:center;background:rgba(${_r},${_g},${_b},0.08);border-bottom:1.5px solid rgba(${_r},${_g},${_b},0.2);flex-shrink:0">
          <span style="font-size:clamp(9px,1.8vw,12px);font-weight:600;color:${accentColor}">${formatDate(date)}</span>
        </div>
        <div style="flex:1;background:#fff;display:flex;align-items:center;justify-content:flex-start;overflow:hidden;padding:3% 5%">
          <img src="${url}" style="max-width:100%;max-height:100%;object-fit:contain;display:block">
        </div>
        <div style="padding:0 5%;display:flex;flex-direction:column;justify-content:center;flex-shrink:0;min-height:9%;border-top:1px solid rgba(${_r},${_g},${_b},0.1)">
          ${p.memo ? `<span style="font-size:clamp(9px,1.8vw,12px);color:#5a3a2a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.memo)}</span>` : ''}
          ${showLogo ? `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0 6px">
            <div style="font-size:clamp(7px,1.3vw,9px);letter-spacing:.2em;color:${accentColor};opacity:.7">すくすくかるがもアルバム</div>
            <div style="width:32px;height:1px;background:${accentColor};opacity:.3"></div>
          </div>` : ''}
        </div>
      </div>`);
  }

  // ===== 最終ページ：メッセージ（あれば）＋ロゴ =====
  if (album.message) {
    pages.push(`
      <div style="width:100%;height:100%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;padding:10% 12%;box-sizing:border-box;text-align:center">
        <div style="font-size:clamp(10px,2vw,12px);letter-spacing:.15em;color:${accentColor};margin-bottom:14px">Message</div>
        <div style="font-size:clamp(13px,2.5vw,16px);line-height:2;color:${textColor};white-space:pre-wrap;flex:1;display:flex;align-items:center">${esc(album.message)}</div>
        ${LOGO_LINE}
      </div>`);
  }

  return pages;
}

function renderSlideViewer(containerId, pages) {
  window._slidePages = window._slidePages || {};
  window._slideIndex = window._slideIndex || {};
  window._slidePages[containerId] = pages;
  window._slideIndex[containerId] = 0;
  document.getElementById(containerId).innerHTML = pages[0] || '';
  document.getElementById(containerId + '-counter').textContent = `1 / ${pages.length}`;
}

function slideGo(containerId, dir) {
  const pages = window._slidePages?.[containerId];
  if (!pages) return;
  const idx = Math.max(0, Math.min(pages.length - 1, (window._slideIndex[containerId] || 0) + dir));
  window._slideIndex[containerId] = idx;
  document.getElementById(containerId).innerHTML = pages[idx];
  document.getElementById(containerId + '-counter').textContent = `${idx + 1} / ${pages.length}`;
}

function slideViewerHtml(containerId) {
  return `
    <div style="background:var(--cream);padding:12px;border-radius:12px;max-width:520px">

async function issueShareLink(albumId) {
  // 既存トークン確認
  const { data: album } = await sb.from('albums').select('share_token, title').eq('id', albumId).single();
  let token = album?.share_token;

  if (!token) {
    // トークン生成（ランダム16バイト）
    token = Array.from(crypto.getRandomValues(new Uint8Array(16)))
      .map(b => b.toString(16).padStart(2,'0')).join('');
    const { error } = await sb.from('albums').update({ share_token: token }).eq('id', albumId);
    if (error) { alert('共有リンクの発行に失敗しました'); return; }
  }

  currentShareLink = `${APP_URL}#/share/${token}`;
  document.getElementById('share-link-display').textContent = currentShareLink;
  openModal('modal-share');
}

async function checkAndLogUsage(action, albumId) {
  const limits = getLimits();
  if (!isFinite(limits.maxAlbumsFinalized)) return true; // unlimited plan

  const now = new Date();
  const monthStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
  const { count } = await sb
    .from('usage_logs')
    .select('*', { count: 'exact', head: true })
    .eq('user_id', currentUser.id)
    .gte('created_at', monthStart);

  if ((count ?? 0) >= limits.maxAlbumsFinalized) {
    alert(`${limits.name}のアルバム作成（PDF・共有）は月${limits.maxAlbumsFinalized}回までです。\nスタンダードプランにアップグレードすると無制限でご利用いただけます。`);
    return false;
  }

  await sb.from('usage_logs').insert({ user_id: currentUser.id, action, album_id: albumId || null });
  return true;
}

async function copyShareLink() {
  if (currentUser) {
    const ok = await checkAndLogUsage('share_copy', null);
    if (!ok) return;
  }
  try {
    await navigator.clipboard.writeText(currentShareLink);
    alert('リンクをコピーしました！');
  } catch {
    prompt('以下のリンクをコピーしてください', currentShareLink);
  }
}

async function downloadAlbumPDF(albumId) {

  const { data: album } = await sb.from('albums').select('*, students(name)').eq('id', albumId).single();

async function generatePDF(album, photos) {
  const title       = album.title || 'アルバム';
  const studentName = album.students?.name || '';
  const accentColor = album.accent_color || '#4a7c6f';
  const textColor   = album.text_color   || '#3d2b1f';
  const photosPerPage = parseInt(album.photos_per_page || 2, 10);

  if (photos.length === 0) { alert('写真がありません'); return; }

  // 共有ページ（window._shareAlbum が存在する＝share_token経由）はプランチェックをスキップ
  // 共有リンクはライトプラン以上でしか発行できないため、閲覧者のプランは問わない
  const isSharePage = !!window._shareAlbum && album === window._shareAlbum;
  if (!isSharePage && !getLimits().canPDF) {
    alert('PDFダウンロードはライトプラン以上でご利用いただけます。アカウントタブからプランをご確認ください。');
    return;
  }

  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '生成中...'; }

  const renderArea = document.getElementById('pdf-render-area');

  // ページサイズ: 150mm×150mm 正方形
  const PAGE_MM = 150;
  const PAGE_PX = 600; // renderAreaの幅と一致

  async function captureHtml(html) {
    renderArea.innerHTML = html;
    renderArea.style.width  = PAGE_PX + 'px';
    renderArea.style.height = PAGE_PX + 'px';
    await new Promise(r => setTimeout(r, 80));
    const canvas = await html2canvas(renderArea, {
      scale: 2,
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#ffffff',
    });
    return canvas.toDataURL('image/jpeg', 0.92);
  }

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [PAGE_MM, PAGE_MM] });

    // ===== 表紙（ギンガムチェック＋中央白パネル） =====
    const pr = parseInt(accentColor.slice(1,3),16);
    const pg = parseInt(accentColor.slice(3,5),16);
    const pb = parseInt(accentColor.slice(5,7),16);
    // ギンガムチェックをSVGのrectで描画（html2canvasはCSS repeating-linear-gradientを正しく描画できないため）
    const CELL = 28;
    const STEP = CELL * 2;
    const ginghamRects = (() => {
      let rects = '';
      for (let x = 0; x < PAGE_PX; x += STEP) {
        rects += `<rect x="${x}" y="0" width="${CELL}" height="${PAGE_PX}" fill="rgb(${pr},${pg},${pb})" fill-opacity="0.13"/>`;
      }
      for (let y = 0; y < PAGE_PX; y += STEP) {
        rects += `<rect x="0" y="${y}" width="${PAGE_PX}" height="${CELL}" fill="rgb(${pr},${pg},${pb})" fill-opacity="0.13"/>`;
      }
      return rects;
    })();
    const PDF_GINGHAM_SVG = `<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;top:0;left:0;width:${PAGE_PX}px;height:${PAGE_PX}px">${ginghamRects}</svg>`;
    const coverPhotoPath   = album.cover_photo_path || null;
    const coverPhotoBase64 = coverPhotoPath ? await fetchImageBase64(coverPhotoPath) : null;
    // object-fit:coverはhtml2canvasで正しく描画されないため、background-imageで代替
    const coverCircleHtml  = coverPhotoBase64
      ? `<div style="width:220px;height:220px;border-radius:50%;background-image:url('${coverPhotoBase64}');background-size:cover;background-position:center;border:3px solid rgba(${pr},${pg},${pb},0.35);margin-bottom:28px;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,.1)"></div>`
      : '';
    const coverHtml = `
      <div style="position:relative;width:${PAGE_PX}px;height:${PAGE_PX}px;background-color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;padding:48px;box-sizing:border-box">
        ${PDF_GINGHAM_SVG}
        <div style="position:relative;z-index:1;background:#fff;border-radius:4px;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;box-sizing:border-box;border:1.5px solid rgba(${pr},${pg},${pb},0.25);box-shadow:0 2px 20px rgba(0,0,0,.07)">
          ${coverCircleHtml}
          <div style="font-size:26px;font-weight:700;text-align:center;line-height:1.5;word-break:break-all;color:${textColor}">${esc(title)}</div>
          ${studentName ? `<div style="font-size:15px;margin-top:12px;color:${textColor};opacity:.65">${esc(studentName)}</div>` : ''}
        </div>
      </div>`;
    const coverImg = await captureHtml(coverHtml);
    doc.addImage(coverImg, 'JPEG', 0, 0, PAGE_MM, PAGE_MM);

    // ===== 写真ページ（1枚/ページ固定） =====
    const DATE_H = 54;  // 日付ヘッダー
    const META_H = 48;  // メモ行
    const IMG_H  = PAGE_PX - DATE_H - META_H;

    for (let pi = 0; pi < photos.length; pi++) {
      const p      = photos[pi];
      const isLast = pi === photos.length - 1;
      doc.addPage([PAGE_MM, PAGE_MM]);
      const imgSrc = p.storage_path ? await fetchImageBase64(getPublicUrl(p.storage_path)) : null;
      const imgTag = imgSrc
        ? `<img src="${imgSrc}" style="max-width:100%;max-height:100%;object-fit:contain;display:block">`
        : `<div style="width:100%;height:100%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:36px">?</div>`;
      const logoLine = isLast && !album.message
        ? `<div style="text-align:center;margin-bottom:4px"><span style="font-size:9px;letter-spacing:.15em;color:${accentColor};opacity:.6">すくすくかるがもアルバム</span></div>`
        : '';
      const pageHtml = `
        <div style="width:${PAGE_PX}px;height:${PAGE_PX}px;background:#fff;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column">
          <div style="height:${DATE_H}px;padding:0 24px;display:flex;align-items:center;background:rgba(${pr},${pg},${pb},0.08);border-bottom:1.5px solid rgba(${pr},${pg},${pb},0.2)">
            <span style="font-size:13px;font-weight:600;color:${accentColor};letter-spacing:.04em">${formatDate(p.recorded_at)}</span>
          </div>
          <div style="height:${IMG_H}px;background:#fff;display:flex;align-items:center;justify-content:flex-start;overflow:hidden;padding:12px 24px">${imgTag}</div>
          <div style="height:${META_H}px;padding:0 24px;display:flex;flex-direction:column;justify-content:center;border-top:1px solid rgba(${pr},${pg},${pb},0.1)">
            ${p.memo ? `<span style="font-size:11px;color:#5a3a2a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.memo)}</span>` : ''}
            ${logoLine}
          </div>
        </div>`;
      const img = await captureHtml(pageHtml);
      doc.addImage(img, 'JPEG', 0, 0, PAGE_MM, PAGE_MM);
    }

    // ===== メッセージページ =====
    const pdfMessage = album.message || '';
    if (pdfMessage) {
      doc.addPage([PAGE_MM, PAGE_MM]);
      const msgHtml = `
        <div style="width:${PAGE_PX}px;height:${PAGE_PX}px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Serif JP',serif;padding:70px 60px;box-sizing:border-box;text-align:center">
          <div style="font-size:13px;letter-spacing:.15em;color:${accentColor};margin-bottom:28px">Message</div>
          <div style="font-size:18px;line-height:2;color:${textColor};white-space:pre-wrap;flex:1;display:flex;align-items:center">${esc(pdfMessage)}</div>
          <div style="margin-top:32px;display:flex;flex-direction:column;align-items:center;gap:6px">
            <div style="font-size:10px;letter-spacing:.2em;color:${accentColor};opacity:.65">すくすくかるがもアルバム</div>
            <div style="width:48px;height:1px;background:${accentColor};opacity:.3"></div>
          </div>
        </div>`;
      const msgImg = await captureHtml(msgHtml);
      doc.addImage(msgImg, 'JPEG', 0, 0, PAGE_MM, PAGE_MM);
    }

    renderArea.innerHTML = '';
    doc.save(`${title}.pdf`);
  } catch(e) {
    alert('PDF生成に失敗しました: ' + e.message);
    console.error(e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '⬇ PDFダウンロード'; }
  }
}

// 画像URLをbase64に変換（CORSを回避するため一度blob経由）
async function fetchImageBase64(url) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    return await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  } catch(e) {
    console.warn('fetchImageBase64 error:', url, e);
    return null;
  }
}

async function saveStudent() {
  const name = document.getElementById('student-name-input').value.trim();
  if (!name) { alert('お名前を入力してください'); return; }

  // 新規追加時のみ上限チェック
  if (!editingStudentId) {
    const limits = getLimits();
    if (isFinite(limits.maxStudents)) {
      const { count } = await sb.from('students').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id);
      if ((count ?? 0) >= limits.maxStudents) {
        alert(`${limits.name}の生徒登録上限（${limits.maxStudents}名）に達しています。\nプランのアップグレードはアカウントタブから行えます。`);
        return;
      }
    }
  }

  const joinedAt = document.getElementById('student-joined-input').value || null;
  const btn = document.querySelector('#modal-student .btn-primary');
  btn.disabled = true;

  try {
    let photoPath = undefined;

    // アバター写真をアップロード
    if (studentAvatarFile) {
      const ext  = studentAvatarFile.name.split('.').pop();
      const path = `avatars/${currentUser.id}/${Date.now()}.${ext}`;
      const { error: upErr } = await sb.storage.from(STORAGE_BUCKET).upload(path, studentAvatarFile, { upsert: true });
      if (upErr) { alert('写真のアップロードに失敗しました: ' + upErr.message); return; }
      photoPath = path;
    } else if (studentDeleteAvatar && editingStudentId) {
      // 既存プロフィール画像をストレージから削除
      const { data: cur } = await sb.from('students').select('photo_path').eq('id', editingStudentId).single();
      if (cur?.photo_path) {
        await sb.storage.from(STORAGE_BUCKET).remove([cur.photo_path]);
      }
      photoPath = null;
    }

    if (editingStudentId) {
      const updates = { name, joined_at: joinedAt };
      if (photoPath !== undefined) updates.photo_path = photoPath;
      await sb.from('students').update(updates).eq('id', editingStudentId);
    } else {
      await sb.from('students').insert({
        user_id: currentUser.id,
        name,
        joined_at: joinedAt,
        photo_path: photoPath || null,
      });
    }

    closeModal('modal-student');

    if (editingStudentId) {
      renderStudentDetail(editingStudentId);
    } else {
      renderStudentList();
    }
  } finally {
    btn.disabled = false;
  }
}

async function deleteStudent(studentId) {
  if (!confirm('この生徒を削除しますか？\n記録・アルバム・写真がすべて削除されます。この操作は取り消せません。')) return;

  // 全記録写真のパスを収集してストレージから削除
  const { data: records } = await sb.from('lesson_records').select('id').eq('student_id', studentId);
  if (records && records.length > 0) {
    const recordIds = records.map(r => r.id);
    const { data: photos } = await sb.from('record_photos').select('storage_path').in('record_id', recordIds);
    if (photos && photos.length > 0) {
      const paths = photos.map(p => p.storage_path).filter(Boolean);
      if (paths.length > 0) await sb.storage.from(STORAGE_BUCKET).remove(paths);
    }
  }

  // プロフィール写真も削除
  const { data: student } = await sb.from('students').select('photo_path').eq('id', studentId).single();
  if (student?.photo_path) {
    await sb.storage.from(STORAGE_BUCKET).remove([student.photo_path]);
  }

  const { error } = await sb.from('students').delete().eq('id', studentId);
  if (error) { alert('削除に失敗しました: ' + error.message); return; }
  location.hash = '#/students';
}

// 既存写真を削除マーク（実際の削除は保存時）
function markExistingPhotoRemoved(photoId, storagePath, el) {
  existingPhotosToRemove.push({ id: photoId, path: storagePath });
  el.remove();
  // 既存写真が0件になったらグループを非表示
  if (document.getElementById('existing-photos-list').children.length === 0) {
    document.getElementById('existing-photos-group').style.display = 'none';
  }
}

// 定型文挿入
function insertPhrase(phrase) {
  const ta = document.getElementById('record-memo-input');
  const pos = ta.selectionStart;
  const before = ta.value.slice(0, pos);
  const after  = ta.value.slice(pos);
  const sep = before && !before.endsWith('\n') ? '\n' : '';
  ta.value = before + sep + phrase + after;
  ta.focus();
}

// 写真ファイル追加
function addPhotoPreviews(files, containerId) {
  const container = document.getElementById(containerId);
  for (const file of files) {
    recordPhotoFiles.push(file);
    const idx = recordPhotoFiles.length - 1;
    const url = URL.createObjectURL(file);
    const div = document.createElement('div');
    div.className = 'photo-preview-item';
    div.dataset.idx = idx;
    div.innerHTML = `
      <div class="photo-img-wrap">
        <img src="${url}" alt="">
        <button class="photo-preview-remove" onclick="removePhotoPreview(${idx})">✕</button>
      </div>
      <textarea class="photo-memo-input" placeholder="メモ（任意）"></textarea>`;
    container.appendChild(div);
  }
}

function removePhotoPreview(idx) {
  recordPhotoFiles[idx] = null; // nullで無効化
  const el = document.querySelector(`[data-idx="${idx}"]`);
  if (el) el.remove();
}

// ドラッグ&ドロップ
function handleDragOver(e, areaId) {
  e.preventDefault();
  document.getElementById(areaId).classList.add('dragover');
}
function handleDragLeave(e, areaId) {
  document.getElementById(areaId).classList.remove('dragover');
}
function handleDrop(e, containerId) {
  e.preventDefault();
  document.getElementById(e.currentTarget.id || '').classList.remove('dragover');
  addPhotoPreviews(e.dataTransfer.files, containerId);
}

async function saveRecord() {
  const date = document.getElementById('record-date-input').value;
  const memo = document.getElementById('record-memo-input').value.trim();
  if (!date) { alert('日付を選択してください'); return; }
  if (!currentStudentId) { alert('生徒が選択されていません'); return; }

  const validFiles = recordPhotoFiles.filter(f => f !== null);

  const btn = document.getElementById('record-save-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    if (editingRecordId) {
      // ===== 編集モード =====
      // 日付・メモを更新
      const { error: uErr } = await sb.from('lesson_records').update({
        memo:        memo || null,
        recorded_at: date,
      }).eq('id', editingRecordId);
      if (uErr) { alert('更新に失敗しました: ' + uErr.message); return; }

      // 削除マークされた既存写真をストレージとDBから削除
      for (const { id, path } of existingPhotosToRemove) {
        await sb.storage.from(STORAGE_BUCKET).remove([path]);
        await sb.from('record_photos').delete().eq('id', id);
      }

      // 既存写真のメモを更新
      const existingItems = document.querySelectorAll('#existing-photos-list .photo-preview-item');
      for (const item of existingItems) {
        const photoId = item.dataset.photoId;
        const memoVal = item.querySelector('.photo-memo-input')?.value?.trim() || null;
        if (photoId) await sb.from('record_photos').update({ memo: memoVal }).eq('id', photoId);
      }

      // 新しい写真をアップロード
      const { data: existingPhotos } = await sb.from('record_photos').select('sort_order').eq('record_id', editingRecordId).order('sort_order', { ascending: false }).limit(1);
      let nextOrder = (existingPhotos?.[0]?.sort_order ?? -1) + 1;
      const newPhotoItems = document.querySelectorAll('#record-photos .photo-preview-item');
      for (let i = 0; i < recordPhotoFiles.length; i++) {
        const file = recordPhotoFiles[i];
        if (!file) continue;
        const memoVal = newPhotoItems[i]?.querySelector('.photo-memo-input')?.value?.trim() || null;
        const ext  = file.name.split('.').pop();
        const path = `records/${currentUser.id}/${currentStudentId}/${editingRecordId}/${Date.now()}_${i}.${ext}`;
        const { error: upErr } = await sb.storage.from(STORAGE_BUCKET).upload(path, file);
        if (upErr) { console.warn('写真アップロードエラー:', upErr); continue; }
        await sb.from('record_photos').insert({ record_id: editingRecordId, storage_path: path, sort_order: nextOrder++, memo: memoVal });
      }
    } else {
      // ===== 新規追加モード =====
      const { data: record, error: rErr } = await sb.from('lesson_records').insert({
        student_id: currentStudentId,
        memo:        memo || null,
        recorded_at: date,
      }).select().single();
      if (rErr) { alert('記録の保存に失敗しました: ' + rErr.message); return; }

      const newPhotoItems = document.querySelectorAll('#record-photos .photo-preview-item');
      for (let i = 0; i < recordPhotoFiles.length; i++) {
        const file = recordPhotoFiles[i];
        if (!file) continue;
        const memoVal = newPhotoItems[i]?.querySelector('.photo-memo-input')?.value?.trim() || null;
        const ext  = file.name.split('.').pop();
        const path = `records/${currentUser.id}/${currentStudentId}/${record.id}/${Date.now()}_${i}.${ext}`;
        const { error: upErr } = await sb.storage.from(STORAGE_BUCKET).upload(path, file);
        if (upErr) { console.warn('写真アップロードエラー:', upErr); continue; }
        await sb.from('record_photos').insert({ record_id: record.id, storage_path: path, sort_order: i, memo: memoVal });
      }
    }

    closeModal('modal-record');
    renderStudentDetail(currentStudentId);
  } finally {
    btn.disabled = false;
    btn.textContent = editingRecordId ? '変更を保存' : '記録を保存';
  }
}

// 記録削除（ストレージから写真も削除）
async function deleteRecord(recordId) {
  if (!confirm('この記録を削除しますか？写真もすべて削除されます。')) return;

  // 写真パスを取得してストレージから削除
  const { data: photos } = await sb.from('record_photos').select('storage_path').eq('record_id', recordId);
  if (photos && photos.length > 0) {
    const paths = photos.map(p => p.storage_path).filter(Boolean);
    if (paths.length > 0) await sb.storage.from(STORAGE_BUCKET).remove(paths);
  }

  await sb.from('lesson_records').delete().eq('id', recordId);
  renderStudentDetail(currentStudentId);
}

        if (recPhotos && recPhotos.length > 0) {
          const paths = recPhotos.map(p => p.storage_path).filter(Boolean);
          if (paths.length > 0) await sb.storage.from(STORAGE_BUCKET).remove(paths);
        }
      }

      // アバター
      const avatarPaths = students.map(s => s.photo_path).filter(Boolean);
      if (avatarPaths.length > 0) await sb.storage.from(STORAGE_BUCKET).remove(avatarPaths);
    }

    // DBはCASCADE DELETEで連鎖削除、studentsを消せば全消える
    if (students && students.length > 0) {
      await sb.from('students').delete().eq('user_id', currentUser.id);
    }

    // Supabase Auth ユーザー削除（自分自身）
    const { error } = await sb.rpc('delete_own_account');
    if (error) {
      // RPCがない場合は auth.admin 経由が必要なためサインアウトのみ
      console.warn('delete_own_account RPC error:', error);
    }

    await sb.auth.signOut();
    alert('アカウントを削除しました。ご利用ありがとうございました。');
    location.href = '/';
  } catch(e) {
    alert('削除に失敗しました: ' + e.message);
    if (btn) { btn.disabled = false; btn.textContent = 'アカウントを削除する'; }
  }
}

async function startCheckout(plan) {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '処理中...';
  try {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(CHECKOUT_FN, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
      body: JSON.stringify({
        plan,
        success_url: `${APP_URL}#/account`,
        cancel_url:  `${APP_URL}#/account`,
      }),
    });
    const data = await res.json();
    if (data.url) window.location.href = data.url;
    else alert('チェックアウトURLを取得できませんでした');
  } finally {
    btn.disabled = false;
    btn.textContent = '14日間無料で試す →';
  }
}

async function openPortal(subscriptionId = null) {
  const { data: { session } } = await sb.auth.getSession();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/create-portal-session`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
    body: JSON.stringify({ return_url: `${APP_URL}#/account` }),
  });
  const data = await res.json();
  if (!data.url) { alert('ポータルURLを取得できませんでした'); return; }
  // サブスクリプションIDが渡された場合はプラン変更画面へ直行
  const dest = subscriptionId
    ? `${data.url}/subscriptions/${subscriptionId}/update`
    : data.url;
  window.location.href = dest;
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = '/index.html';
}

// ============================================================
// モーダルユーティリティ
// ============================================================
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// オーバーレイクリックで閉じる
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

// ============================================================
// ライトボックス
// ============================================================
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    document.querySelectorAll('.modal-overlay.open').forEach(m => closeModal(m.id));
  }
});

// ============================================================
// ユーティリティ
// ============================================================
function getPublicUrl(path) {
  if (!path) return '';
  return sb.storage.from(STORAGE_BUCKET).getPublicUrl(path).data.publicUrl;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  } catch { return dateStr; }
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function errHtml(msg) {
  return `<div class="notice notice-error">エラー: ${esc(msg)}</div>`;
}

function emptyState(icon, text) {
  return `
    <div class="empty-state" style="grid-column:1/-1">
      <div class="empty-state-icon">${icon}</div>
      <div>${text}</div>
    </div>`;
}
</script>
